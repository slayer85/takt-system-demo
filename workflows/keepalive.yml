# WGRAJ do repo demo jako:  .github/workflows/keepalive.yml
name: keepalive-supabase-demo
on:
  schedule:
    - cron: '23 6 * * *'   # codziennie 06:23 UTC
  workflow_dispatch:        # ręczne odpalenie z zakładki Actions
