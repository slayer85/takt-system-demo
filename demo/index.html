<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Zapisy na lekcje</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --gold:#D62B1F; --bg:#f4f4f5; --card:#fff; --border:#e5e5e5; --text:#1a1a1a; --muted:#6b6560; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); }
  header{ background:#1a1a1a; color:#fff; padding:16px 18px; border-bottom:3px solid var(--gold); }
  .hdr-inner{ display:flex; align-items:center; gap:14px; }
  .hdr-logo{ height:46px; filter:invert(1); display:block; flex-shrink:0; }
  header h1{ margin:0; font-size:1.15rem; }
  header p{ margin:4px 0 0; font-size:.82rem; opacity:.8; }
  main{ width:90%; max-width:1800px; margin:0 auto; padding:16px; }
  @media(max-width:900px){ main{ width:100%; } }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:14px; }
  .btn{ border:none; border-radius:9px; padding:11px 16px; font-size:.95rem; font-weight:700; cursor:pointer; }
  .btn-primary{ background:var(--gold); color:#fff; }
  .btn-primary:active{ filter:brightness(.92); }
  .btn-ghost{ background:#f0ede6; color:#1a1a1a; }
  input{ width:100%; padding:11px; border:1px solid var(--border); border-radius:9px; font-size:1rem; }
  .seg{ display:flex; gap:8px; margin-bottom:14px; }
  .seg-btn{ flex:1; padding:11px; border:1.5px solid var(--border); border-radius:9px; background:#fff; font-weight:700; font-size:.92rem; cursor:pointer; color:var(--muted); }
  .seg-btn.active{ border-color:var(--gold); background:#fafafa; color:#1a1a1a; box-shadow:inset 0 0 0 1px var(--gold); }
  .price-line{ margin:12px 0 4px; font-size:.95rem; }
  .price-line b{ font-size:1.15rem; color:var(--gold-d, #A81E14); }
  .price-line span{ color:var(--muted); font-size:.82rem; }
  .week-nav{ display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:8px; }
  .week-nav button{ width:40px; height:40px; border:none; border-radius:9px; background:#f0ede6; font-size:1.2rem; cursor:pointer; }
  .week-nav .lbl{ font-weight:700; min-width:150px; text-align:center; font-size:.95rem; }
  .day-title{ font-weight:800; margin:22px 0 10px; font-size:1.05rem; }
  .trainer-cols{ display:flex; flex-direction:row; gap:8px; flex-wrap:nowrap; align-items:flex-start; }
  .trainer-col{ flex:1 1 0; min-width:0; background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  @media(max-width:760px){
    .trainer-cols{ flex-wrap:wrap; }
    .trainer-col{ flex:1 1 140px; min-width:140px; }
  }
  .trainer-head{ background:#1a1a1a; color:#fff; font-weight:800; font-size:.9rem; padding:10px 13px; border-bottom:3px solid var(--accent); }
  .trainer-col-body{ padding:7px; display:flex; flex-direction:column; gap:8px; }
  .trainer-col-body .slot{ margin:0; flex-direction:column; align-items:stretch; gap:7px; padding:9px; }
  .trainer-col-body .slot .time{ font-size:.88rem; }
  .trainer-col-body .slot .btn{ width:100%; padding:9px 6px; }
  .trainer-col-body .slot .taken-lbl{ align-self:flex-start; }
  .days-row{ display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start; }
  .day-block{ flex:1 1 340px; min-width:300px; }
  .slot{ display:flex; align-items:center; gap:12px; border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:9px; background:#fafafa; }
  .slot.la{ border-left:5px solid var(--gold); }
  .slot.st{ border-left:5px solid #1a1a1a; }
  .slot.taken{ opacity:.6; background:#f0efe9; }
  .slot .info{ flex:1; }
  .slot .time{ font-weight:800; font-size:1rem; }
  .slot .meta{ font-size:.8rem; color:var(--muted); margin-top:2px; }
  .badge{ font-size:.68rem; font-weight:800; padding:2px 8px; border-radius:20px; }
  .badge.la{ background:var(--gold); color:#fff; }
  .badge.st{ background:#1a1a1a; color:#fff; }
  .taken-lbl{ font-size:.8rem; font-weight:700; color:var(--muted); }
  .empty{ color:#b8b2a8; font-style:italic; font-size:.88rem; padding:8px 2px; }
  .hint{ font-size:.8rem; color:var(--muted); margin-top:6px; }
  .toast{ position:fixed; left:50%; bottom:20px; transform:translateX(-50%); background:#1a1a1a; color:#fff; padding:11px 18px; border-radius:10px; font-size:.9rem; opacity:0; transition:.25s; pointer-events:none; z-index:50; max-width:90%; }
  .toast.show{ opacity:1; }
  .toast.err{ background:#b3261e; }
  .hidden{ display:none; }
  .modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:16px; z-index:40; }
  .modal-bg.open{ display:flex; }
  .modal{ background:#fff; border-radius:14px; padding:20px; width:100%; max-width:380px; }
  .modal h3{ margin:0 0 12px; }
  .modal .row{ display:flex; gap:10px; margin-top:14px; }
  .modal .row .btn{ flex:1; }
</style>
</head>
<body>
<header>
  <div class="hdr-inner">
    <img class="hdr-logo" id="brandLogo" src="" alt="" style="display:none">
    <div>
      <h1>Zapisy na lekcje</h1>
      <p id="brandSub">lekcje indywidualne i szkolenia weekendowe · 45 min</p>
    </div>
  </div>
</header>
<main>

  <!-- Ekran PIN -->
  <div id="pinScreen" class="card">
    <h3 style="margin-top:0">Podaj PIN dostępu</h3>
    <p class="hint" style="margin-top:0">PIN otrzymasz od swojego trenera.</p>
    <input type="password" id="pinInput" placeholder="PIN" autocomplete="off">
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="enterPin()">Wejdź</button>
    <div id="pinErr" class="hint" style="color:#b3261e"></div>
  </div>

  <!-- Ekran grafiku -->
  <div id="app" class="hidden">
    <div class="card">
      <div class="week-nav">
        <button onclick="changeWeek(-1)">‹</button>
        <span class="lbl" id="weekLabel"></span>
        <button onclick="changeWeek(1)">›</button>
      </div>
      <p class="hint" style="text-align:center;margin:0">Kliknij wolny termin, aby zapisać swoją parę. Zajęte terminy są wyszarzone.</p>
    </div>
    <div class="days-row" id="daysRow"></div>
  </div>
</main>

<!-- Modal: zapisz parę -->
<div class="modal-bg" id="bookModal">
  <div class="modal">
    <h3>Zapisz się na lekcję</h3>
    <div id="bookInfo" style="background:var(--bg);border-radius:9px;padding:10px;font-size:.88rem;margin-bottom:12px"></div>
    <label class="hint">Kto bierze udział?</label>
    <div class="seg">
      <button type="button" class="seg-btn active" id="segPara" onclick="setPeople(2)">Para · 2 osoby</button>
      <button type="button" class="seg-btn" id="segSolo" onclick="setPeople(1)">Solistka / Solista · 1 osoba</button>
    </div>
    <label class="hint" id="nameLbl">Nazwa Waszej pary</label>
    <input type="text" id="pairInput" placeholder="np. Jan Kowalski &amp; Anna Nowak" autocomplete="off">
    <div class="price-line">Do zapłaty: <b id="priceVal">120 zł</b> <span>· za lekcję, płatne u trenera</span></div>
    <div class="row">
      <button class="btn btn-ghost" onclick="closeBook()">Anuluj</button>
      <button class="btn btn-primary" onclick="confirmBook()">Zapisz</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════ KONFIGURACJA SZKOŁY (TAKT) — uzupełnij przy wdrożeniu ═══════════
const TAKT_CONFIG = {
  schoolName:      'Studio Demo TAKT',                 // nagłówek strony
  supabaseUrl:     'https://ecoqpvfcumflkyluylcr.supabase.co',   // Supabase → Settings → API (Project URL)
  supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjb3FwdmZjdW1mbGt5bHV5bGNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjU1MzAsImV4cCI6MjA5OTAwMTUzMH0.7wg2QXe0ETKhEWVZSgZdv2Nzi99HEuplGGD70rP6e4g',                     // Supabase → Settings → API (anon public)
  logo:            '',                                   // 'data:image/png;base64,...' lub URL; '' = bez logo
};
// ═════════════════════════════════════════════════════════════
const SUPABASE_URL      = TAKT_CONFIG.supabaseUrl;
const SUPABASE_ANON_KEY = TAKT_CONFIG.supabaseAnonKey;

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let week = 0;            // 0 = bieżący tydzień
let pin = '';
let currentSlotId = null;

// --- daty / tygodnie ---
function mondayOf(off){ const d=new Date(); d.setHours(0,0,0,0); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow+off*7); return d; }
function weekdayDate(off,wd){ const d=mondayOf(off); d.setDate(d.getDate()+(wd==='czwartek'?3:4)); return d; }
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDM(d){ return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0'); }
function addMin(hhmm,m){ const [h,mm]=hhmm.split(':').map(Number); const t=h*60+mm+m; return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const PL_DAYS=['niedziela','poniedziałek','wtorek','środa','czwartek','piątek','sobota'];
function dayName(d){ return PL_DAYS[d.getDay()]; }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function toast(msg, isErr){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(isErr?' err':''); setTimeout(()=>t.className='toast',2600); }

async function enterPin(){
  const val = document.getElementById('pinInput').value.trim();
  const err = document.getElementById('pinErr');
  if(!val){ err.textContent='Wpisz PIN.'; return; }
  err.textContent='Sprawdzam…';
  const { data, error } = await sb.rpc('check_pin', { p_pin: val });
  if(error){ err.textContent='Błąd: ' + (error.message || error.code || JSON.stringify(error)); console.error('check_pin error', error); return; }
  if(!data){ err.textContent='Nieprawidłowy PIN.'; sessionStorage.removeItem('zapisy_pin'); return; }
  pin = val;
  err.textContent='';
  sessionStorage.setItem('zapisy_pin', pin);
  document.getElementById('pinScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  subscribe();
  render();
}

function changeWeek(d){ week+=d; render(); }

async function render(){
  const monday=mondayOf(week), sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
  document.getElementById('weekLabel').textContent=(week===0?'Ten tydzień · ':'')+fmtDM(monday)+' – '+fmtDM(sunday);

  // Pobierz cały tydzień (Pn–Niedz) — pokazujemy każdy dzień, który ma opublikowane lekcje
  // (lekcje indywidualne Czw/Pt oraz szkolenia weekendowe Sob/Niedz).
  const { data, error } = await sb.from('lessons').select('*').gte('date',fmtDate(monday)).lte('date',fmtDate(sunday)).order('start_time');
  if(error){ toast('Błąd pobierania: '+error.message, true); return; }
  const lessons = data || [];

  let html='';
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    const ds=fmtDate(d);
    const dayLessons=lessons.filter(l=>l.date===ds);
    if(!dayLessons.length) continue;
    html += `<div class="day-block">` + dayHtml(cap(dayName(d)), d, dayLessons) + `</div>`;
  }
  document.getElementById('daysRow').innerHTML = html ||
    `<div class="empty" style="padding:20px">Brak terminów w tym tygodniu. Sprawdź inny tydzień strzałkami ‹ ›.</div>`;
}

function slotHtml(l, dayLabel){
  const cls=l.style==='ST'?'st':'la';
  const taken=l.pair && l.pair.trim();
  const price=(l.price!=null)?l.price:120;
  return `<div class="slot ${cls}${taken?' taken':''}">
    <div class="info">
      <div class="time">${l.start_time} – ${addMin(l.start_time,45)} <span class="badge ${cls}">${l.style}</span></div>
      <div class="meta">${price} zł</div>
    </div>
    ${ taken
        ? `<span class="taken-lbl">✓ Zajęte</span>`
        : `<button class="btn btn-primary" onclick="openBook('${l.id}','${dayLabel}','${l.start_time}','${l.style}','${esc(l.trainer).replace(/'/g,"\\'")}',${price})">Zapisz parę</button>` }
  </div>`;
}

function dayHtml(name, dateObj, slots){
  const dayLabel=`${name} ${fmtDM(dateObj)}`;
  let out=`<div class="day-title">${dayLabel}</div>`;
  if(!slots.length){ return out+`<div class="empty">Brak terminów w tym dniu.</div>`; }
  // grupuj po trenerze — każdy trener swoja kolumna
  const byTrainer={};
  slots.forEach(l=>{ (byTrainer[l.trainer]=byTrainer[l.trainer]||[]).push(l); });
  const trainers=Object.keys(byTrainer).sort((a,b)=>a.localeCompare(b,'pl'));
  out+=`<div class="trainer-cols">`;
  trainers.forEach(tr=>{
    const list=byTrainer[tr].sort((a,b)=>a.start_time.localeCompare(b.start_time));
    out+=`<div class="trainer-col"><div class="trainer-head">${esc(tr)}</div><div class="trainer-col-body">`
       + list.map(l=>slotHtml(l,dayLabel)).join('')
       + `</div></div>`;
  });
  out+=`</div>`;
  return out;
}

let people=2;
let currentPrice=120;
function setPeople(n){
  people=n;
  document.getElementById('segPara').classList.toggle('active', n===2);
  document.getElementById('segSolo').classList.toggle('active', n===1);
  document.getElementById('priceVal').textContent=currentPrice+' zł';
  document.getElementById('nameLbl').textContent = n===1 ? 'Imię i nazwisko' : 'Nazwa Waszej pary';
  const inp=document.getElementById('pairInput');
  inp.placeholder = n===1 ? 'np. Anna Nowak' : 'np. Jan Kowalski & Anna Nowak';
}

function openBook(id, dayLabel, start, style, trainer, price){
  currentSlotId=id;
  currentPrice=(price!=null)?price:120;
  document.getElementById('pairInput').value='';
  setPeople(2);
  document.getElementById('bookInfo').innerHTML=`<strong>${dayLabel}</strong>, ${start} – ${addMin(start,45)}<br>${style==='LA'?'Latin (LA)':'Standard (ST)'} · ${trainer} · <strong>${currentPrice} zł</strong>`;
  document.getElementById('bookModal').classList.add('open');
  setTimeout(()=>document.getElementById('pairInput').focus(),50);
}
function closeBook(){ document.getElementById('bookModal').classList.remove('open'); }

async function confirmBook(){
  const pair=document.getElementById('pairInput').value.trim();
  if(!pair){ toast(people===1?'Wpisz imię i nazwisko.':'Wpisz nazwę pary.', true); return; }
  const { error } = await sb.rpc('book_slot',{ p_id:currentSlotId, p_pair:pair, p_pin:pin, p_people:people });
  if(error){ toast(error.message||'Nie udało się zapisać', true); render(); return; }
  closeBook();
  toast('Zapisano! 🎉');
  render();
}

function subscribe(){
  sb.channel('lessons-rt')
    .on('postgres_changes',{ event:'*', schema:'public', table:'lessons' }, ()=>render())
    .subscribe();
}

function applyBranding(){
  try{
    var n=(TAKT_CONFIG.schoolName||'').trim();
    if(n){ document.title='Zapisy na lekcje — '+n;
           var s=document.getElementById('brandSub'); if(s) s.textContent=n+' · lekcje indywidualne i szkolenia weekendowe · 45 min'; }
    var lg=document.getElementById('brandLogo');
    if(lg && (TAKT_CONFIG.logo||'').trim()){ lg.src=TAKT_CONFIG.logo; lg.style.display=''; }
  }catch(e){}
}
applyBranding();

// auto-login jeśli PIN w sesji
const saved=sessionStorage.getItem('zapisy_pin');
if(saved){ document.getElementById('pinInput').value=saved; enterPin(); }
document.getElementById('pinInput').addEventListener('keydown',e=>{ if(e.key==='Enter') enterPin(); });
document.getElementById('pairInput').addEventListener('keydown',e=>{ if(e.key==='Enter') confirmBook(); });
</script>
</body>
</html>
