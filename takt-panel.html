  .l-actions{display:flex;gap:8px;margin-top:9px;}
  .l-actions .grow{flex:1;}
  .tag-weekend{font-size:.68rem;font-weight:800;background:#f0ede6;color:#5a554d;
               border-radius:20px;padding:1px 8px;vertical-align:middle;}

  .status{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);margin-top:14px;justify-content:center;}
  .dot{width:9px;height:9px;border-radius:50%;background:#bbb;}
  .dot.on{background:#16a34a;box-shadow:0 0 6px #16a34a;}

  .modal-bg{position:fixed;inset:0;background:rgba(20,20,19,.55);display:none;
            align-items:flex-end;justify-content:center;z-index:20;}
  @media(min-width:700px){ .modal-bg{align-items:center;} }
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:440px;}
  @media(min-width:700px){ .modal{border-radius:16px;} }
  .modal h3{margin:0 0 4px;font-size:1.1rem;}
  .modal .foot{display:flex;gap:10px;margin-top:18px;}
  .modal .foot .btn{flex:1;}

  .seg{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;padding:10px;border:0;background:#fff;font-weight:700;font-size:.9rem;cursor:pointer;color:var(--muted);}
  .seg button.active{background:#1a1a1a;color:var(--gold);}

  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1a1a1a;color:#fff;
         padding:10px 18px;border-radius:24px;font-size:.88rem;opacity:0;transition:opacity .25s;
         pointer-events:none;z-index:30;max-width:90vw;text-align:center;}
  #toast.show{opacity:1;}
  #toast.err{background:#8f2018;}
</style>


<header>
  <div class="hdr">
    <h1>Panel trenera <span class="sub" id="brandSub">grafik i zapisy</span></h1>
    <button class="btn btn-sm hidden" id="lockBtn" onclick="lock()" title="Wyloguj">🔒</button>
  </div>
</header>

<main>

  <!-- Ekran PIN -->
  <div id="pinScreen" class="card" style="max-width:420px;margin:24px auto">
    <h3 style="margin-top:0">PIN trenera</h3>
    <p class="hint" style="margin-top:0">Panel pokazuje grafik i zapisy par. Uczestnicy i wpłaty są dostępne wyłącznie w pełnej aplikacji na komputerze.</p>
    <input type="password" id="pinInput" placeholder="PIN trenera" autocomplete="off">
    <button class="btn btn-primary btn-full" onclick="enterPin()">Wejdź</button>
    <div id="pinErr" class="hint" style="color:#b3261e;margin-top:8px"></div>
  </div>

  <!-- Aplikacja -->
  <div id="app" class="hidden">
    <div class="weekbar">
      <button class="btn" onclick="changeWeek(-1)" aria-label="Poprzedni tydzień">‹</button>
      <div class="wk" id="weekLabel"></div>
      <button class="btn" onclick="changeWeek(1)" aria-label="Następny tydzień">›</button>
    </div>
    <div class="days" id="days"></div>
    <button class="btn" style="width:100%;margin-top:12px" onclick="openAddAnyDay()" title="Dodaj lekcję w dniu, którego nie ma na liście (np. święto)">＋ Lekcja w innym dniu</button>
    <div class="status"><span class="dot" id="rtDot"></span><span id="statusTxt">Łączę…</span></div>
  </div>

</main>

<!-- MODAL: zapis pary -->
<div class="modal-bg" id="bookModal">
  <div class="modal">
    <h3>Zapisz na lekcję</h3>
    <p class="hint" id="bookInfo" style="margin:2px 0 0"></p>
    <label>Kto bierze udział?</label>
    <div class="seg" id="peopleSeg">
      <button type="button" class="active" data-p="2" onclick="setPeople(2)">👯 Para</button>
      <button type="button" data-p="1" onclick="setPeople(1)">🧍 Solistka / solista</button>
    </div>
    <label id="nameLabel">Nazwa pary</label>
    <input id="pairName" placeholder="np. Kowalscy" autocomplete="off">
    <div class="foot">
      <button class="btn" onclick="closeModal('bookModal')">Anuluj</button>
      <button class="btn btn-primary" onclick="confirmBook()">Zapisz</button>
    </div>
  </div>
</div>

<!-- MODAL: nowa lekcja indywidualna -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h3>Nowa lekcja</h3>
    <p class="hint" id="addInfo" style="margin:2px 0 0"></p>
    <div id="aDayRow" style="display:none">
      <label>Dzień</label>
      <select id="aDay"></select>
    </div>
    <label>Trener</label>
    <input id="aTrainer" list="trainerList" placeholder="imię trenera" autocomplete="off">
    <datalist id="trainerList"></datalist>
    <label>Styl</label>
    <div class="seg" id="styleSeg">
      <button type="button" class="active" data-s="LA" onclick="setStyle('LA')">LA — Latin</button>
      <button type="button" data-s="ST" onclick="setStyle('ST')">ST — Standard</button>
    </div>
    <label>Godzina rozpoczęcia (lekcja 45 min)</label>
    <input id="aTime" type="time" step="300">
    <div class="foot">
      <button class="btn" onclick="closeModal('addModal')">Anuluj</button>
      <button class="btn btn-primary" onclick="confirmAdd()">Dodaj lekcję</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL  = TAKT_CONFIG.supabaseUrl;
const SUPABASE_ANON = TAKT_CONFIG.supabaseAnonKey;
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let pin = '', week = 0, lessons = [], currentId = null, curPeople = 2, curStyle = 'LA', addDate = null;
let lessonPrice = 120;   // cena lekcji indywidualnej (z chmury, get_lesson_price)

// ---- daty ----
function fmtDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseDate(s){ const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function fmtDM(s){ const d=parseDate(s); return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0'); }
function mondayOf(off){ const d=new Date(); d.setHours(0,0,0,0); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow+off*7); return d; }
function weekDates(off){ const m=mondayOf(off); return Array.from({length:7},(_,i)=>{ const d=new Date(m); d.setDate(m.getDate()+i); return fmtDate(d); }); }
const DAY_PL = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
function dayName(s){ return DAY_PL[parseDate(s).getDay()]; }
function addMinutes(hhmm,mins){ const [h,m]=hhmm.split(':').map(Number); const t=h*60+m+mins;
  return String(Math.floor(t/60)%24).padStart(2,'0')+':'+String(t%60).padStart(2,'0'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---- toast / modale ----
let toastT=null;
function toast(msg,isErr){ const t=document.getElementById('toast'); t.textContent=msg;
  t.className='show'+(isErr?' err':''); clearTimeout(toastT); toastT=setTimeout(()=>t.className='',3200); }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ---- PIN ----
async function enterPin(){
  const val=document.getElementById('pinInput').value.trim();
  const err=document.getElementById('pinErr');
  if(!val){ err.textContent='Wpisz PIN.'; return; }
  err.textContent='';
  const { data, error } = await sb.rpc('check_trainer_pin', { p_pin: val });
  if(error){ err.textContent='Błąd: '+(error.message||error.code); return; }
  if(!data){ err.textContent='Nieprawidłowy PIN.'; sessionStorage.removeItem('panel_pin'); return; }
  pin=val;
  sessionStorage.setItem('panel_pin', pin);
  document.getElementById('pinScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('lockBtn').classList.remove('hidden');
  subscribe();
  load();
}
function lock(){
  sessionStorage.removeItem('panel_pin'); pin='';
  document.getElementById('app').classList.add('hidden');
  document.getElementById('lockBtn').classList.add('hidden');
  document.getElementById('pinScreen').classList.remove('hidden');
  document.getElementById('pinInput').value='';
}

// ---- dane ----
function changeWeek(d){ week+=d; load(); }

async function load(){
  const days=weekDates(week);
  // trainer_slots (PIN) zwraca terminy z nazwami par; bezpośredni odczyt tabeli
  // pokazuje tylko znacznik zajętości (prywatność nazw). Sortowanie po stronie serwera.
  const { data, error } = await sb.rpc('trainer_slots', { p_pin: pin, p_from: days[0], p_to: days[6] });
  const dot=document.getElementById('rtDot'), st=document.getElementById('statusTxt');
  if(error){ dot.className='dot'; st.textContent='Brak połączenia'; toast('Błąd pobierania: '+(error.message||error), true); return; }
  dot.className='dot on'; st.textContent='Połączono — zmiany widać na żywo';
  lessons = data || [];
  render();
  sb.rpc('get_lesson_price').then(r => { if(!r.error && r.data != null) lessonPrice = r.data; });
}

function render(){
  const days=weekDates(week);
  document.getElementById('weekLabel').textContent = fmtDM(days[0])+' – '+fmtDM(days[6]);
  // Czw/Pt zawsze widoczne (można dodawać lekcje); inne dni tylko gdy mają lekcje (szkolenia weekendowe)
  const show = days.filter((d,i)=> i===3 || i===4 || lessons.some(l=>l.date===d));
  const box=document.getElementById('days');
  box.innerHTML = show.map(d=>{
    const list = lessons.filter(l=>l.date===d);
    return `<div class="day">
      <div class="day-head"><span>${dayName(d)} ${fmtDM(d)}</span><span class="cnt">${list.length ? list.length+' lekcji' : ''}</span></div>
      <div class="day-body">
        ${list.length ? list.map(lessonHtml).join('') : '<div class="empty">Brak lekcji</div>'}
        <button class="btn btn-sm" onclick="openAdd('${d}')">＋ Lekcja</button>
      </div>
    </div>`;
  }).join('');
  // podpowiedzi trenerów w formularzu dodawania
  const trainers=[...new Set(lessons.filter(l=>(l.kind||'weekly')==='weekly').map(l=>l.trainer))];
  document.getElementById('trainerList').innerHTML = trainers.map(t=>`<option value="${esc(t)}">`).join('');
}

function lessonHtml(l){
  const st=(l.style==='LA')?'la':'st';
  const booked=(l.pair||'')!=='';
  const weekend=(l.kind||'weekly')==='weekend';
  const icon=(l.people===1)?'🧍':'👯';
  return `<div class="lesson ${st}">
    <div class="l-top">
      <span class="l-time">${esc(l.start_time)} – ${addMinutes(l.start_time,45)}</span>
      <span class="l-style ${st}">${l.style}</span>
      <span class="l-trainer">${esc(l.trainer)}</span>
      ${weekend?'<span class="tag-weekend">szkolenie</span>':''}
      <span class="l-price">${l.price!=null?l.price:120} zł</span>
    </div>
    <div class="l-pair ${booked?'':'free'}">${booked ? icon+' <span class="who">'+esc(l.pair)+'</span>' : 'Wolny termin'}</div>
    <div class="l-actions">
      ${booked
        ? `<button class="btn btn-sm grow" onclick="unbook('${l.id}')">✕ Wypisz</button>`
        : `<button class="btn btn-sm btn-primary grow" onclick="openBook('${l.id}')">＋ Zapisz parę</button>`}
      ${weekend ? '' : `<button class="btn btn-sm btn-danger" onclick="delLesson('${l.id}')" title="Usuń lekcję">🗑</button>`}
    </div>
  </div>`;
}

// ---- zapis / wypis pary ----
function setPeople(p){ curPeople=p;
  document.querySelectorAll('#peopleSeg button').forEach(b=>b.classList.toggle('active',+b.dataset.p===p));
  document.getElementById('nameLabel').textContent = p===1 ? 'Imię i nazwisko solistki / solisty' : 'Nazwa pary';
}
function openBook(id){
  const l=lessons.find(x=>x.id===id); if(!l) return;
  currentId=id; setPeople(2);
  document.getElementById('pairName').value='';
  document.getElementById('bookInfo').textContent =
    dayName(l.date)+' '+fmtDM(l.date)+', '+l.start_time+' – '+addMinutes(l.start_time,45)+' · '+l.style+' · '+l.trainer;
  openModal('bookModal');
}
async function confirmBook(){
  const name=document.getElementById('pairName').value.trim();
  if(!name){ toast('Wpisz nazwę pary lub imię solisty.', true); return; }
  const { error } = await sb.rpc('trainer_set_pair', { p_pin: pin, p_id: currentId, p_pair: name, p_people: curPeople });
  if(error){ toast('Nie udało się zapisać: '+(error.message||error), true); return; }
  closeModal('bookModal'); toast('Zapisano: '+name); load();
}
async function unbook(id){
  const l=lessons.find(x=>x.id===id); if(!l) return;
  if(!confirm('Wypisać „'+l.pair+'" z lekcji '+l.start_time+'?')) return;
  const { error } = await sb.rpc('trainer_set_pair', { p_pin: pin, p_id: id, p_pair: '', p_people: 2 });
  if(error){ toast('Nie udało się wypisać: '+(error.message||error), true); return; }
  toast('Termin zwolniony'); load();
}

// ---- usuwanie lekcji (tylko Czw/Pt; szkolenia zarządzane z komputera) ----
async function delLesson(id){
  const l=lessons.find(x=>x.id===id); if(!l) return;
  const extra = l.pair ? '\nNa tę lekcję zapisana jest para: '+l.pair+'!' : '';
  if(!confirm('Usunąć lekcję '+l.start_time+' ('+l.trainer+')?'+extra)) return;
  const { error } = await sb.rpc('trainer_delete_slot', { p_pin: pin, p_id: id });
  if(error){ toast('Nie udało się usunąć: '+(error.message||error), true); return; }
  toast('Lekcja usunięta'); load();
}

// ---- dodawanie lekcji indywidualnej (dowolny dzień, przez publish_slots — zachowuje rezerwacje) ----
const WD_SLUG = ['niedziela','poniedzialek','wtorek','sroda','czwartek','piatek','sobota'];
function setStyle(s){ curStyle=s;
  document.querySelectorAll('#styleSeg button').forEach(b=>b.classList.toggle('active',b.dataset.s===s)); }
function openAdd(date){
  addDate=date;
  document.getElementById('aDayRow').style.display='none';
  setStyle('LA');
  document.getElementById('aTime').value='16:00';
  document.getElementById('addInfo').textContent = dayName(date)+' '+fmtDM(date)+' · lekcja indywidualna 45 min · '+lessonPrice+' zł';
  openModal('addModal');
}
// Lekcja w dniu, którego nie ma jeszcze na liście (np. święto w środę) — wybór dnia w modalu.
function openAddAnyDay(){
  addDate=null;
  const days=weekDates(week);
  const sel=document.getElementById('aDay');
  sel.innerHTML = days.map(d=>`<option value="${d}">${dayName(d)} ${fmtDM(d)}</option>`).join('');
  sel.value = days[3];  // domyślnie czwartek
  document.getElementById('aDayRow').style.display='';
  setStyle('LA');
  document.getElementById('aTime').value='16:00';
  document.getElementById('addInfo').textContent='lekcja indywidualna 45 min · '+lessonPrice+' zł';
  openModal('addModal');
}
async function confirmAdd(){
  const date=addDate || document.getElementById('aDay').value;
  const trainer=document.getElementById('aTrainer').value.trim();
  const time=document.getElementById('aTime').value;
  if(!trainer){ toast('Wpisz imię trenera.', true); return; }
  if(!time){ toast('Wybierz godzinę.', true); return; }
  const toMin=t=>{ const [h,m]=t.split(':').map(Number); return h*60+m; };
  const ns=toMin(time), ne=ns+45;
  const clash=lessons.find(l=>l.trainer===trainer && l.date===date &&
    (()=>{ const es=toMin(l.start_time), ee=es+45; return ns<ee && es<ne; })());
  if(clash){ toast(trainer+' ma już lekcję '+clash.start_time+' – '+addMinutes(clash.start_time,45)+' tego dnia.', true); return; }
  const weekly=lessons.filter(l=>(l.kind||'weekly')==='weekly').map(l=>({
    id:l.id, date:l.date, weekday:l.weekday, trainer:l.trainer, style:l.style, start_time:l.start_time,
    price:(l.price!=null?l.price:lessonPrice) }));
  weekly.push({ id:uid(), date:date, weekday:WD_SLUG[parseDate(date).getDay()],
    trainer:trainer, style:curStyle, start_time:time, price:lessonPrice });
  const { error } = await sb.rpc('publish_slots', { p_pin: pin, p_week_start: fmtDate(mondayOf(week)), p_slots: weekly });
  if(error){ toast('Nie udało się dodać: '+(error.message||error), true); return; }
  closeModal('addModal'); toast('Dodano lekcję '+dayName(date)+' '+time); load();
}

// ---- realtime ----
function subscribe(){
  sb.channel('panel-rt')
    .on('postgres_changes',{ event:'*', schema:'public', table:'lessons' }, ()=>load())
    .subscribe();
}

function applyBranding(){
  try{
    var n=(TAKT_CONFIG.schoolName||'').trim();
    if(n){ document.title='Panel trenera — '+n;
           var s=document.getElementById('brandSub'); if(s) s.textContent='grafik i zapisy — '+n; }
  }catch(e){}
}
applyBranding();

// ---- start ----
const saved=sessionStorage.getItem('panel_pin');
if(saved){ document.getElementById('pinInput').value=saved; enterPin(); }
document.getElementById('pinInput').addEventListener('keydown',e=>{ if(e.key==='Enter') enterPin(); });
</script>

</template>
</body>
</html>
