function analyzeTransfers() {
  lastSaveSession = null;
  const raw = document.getElementById('transferInput').value;
  const prof = (typeof TAKT_CONFIG !== 'undefined' && TAKT_CONFIG.bankProfile) || 'auto';
  let lines;
  if (prof === 'mt940' || (prof === 'auto' && isSTA(raw))) {
    lines = parseSTA(raw);
    if (lines.length === 0) { alert('Nie udało się odczytać przelewów z pliku MT940.'); return; }
  } else if (prof === 'ing' || (prof === 'auto' && isINGCSV(raw))) {
    lines = parseINGCSV(raw);
    if (lines.length === 0) { alert('Nie udało się odczytać transakcji z pliku CSV ING.'); return; }
  } else if (prof === 'generic' || (prof === 'auto' && isGenericCSV(raw))) {
    lines = parseGenericCSV(raw);
    if (lines.length === 0) { alert('Nie udało się odczytać transakcji z pliku CSV.'); return; }
  } else {
    lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0).map(l => ({ line: l, date: null }));
  }
  if (lines.length === 0) { alert('Wklej dane przelewów!'); return; }
  if (db.participants.length === 0) { alert('Najpierw dodaj uczestników!'); return; }

  const results = lines.map(({ line, date }) => {
    const normLine = normalize(line);
    // Wersja bez spacji — do wykrywania rozbitych słów (artefakt MT940: "anasta zja" → "anastazja")
    const compactLine = normLine.replace(/\s+/g, '');
    // Pomocnicze: sprawdza imię/nazwisko w normLine LUB w compactLine (dla nazw ≥5 znaków)
    const fnInLine = (name) => nameInLine(name, normLine) || (name.length >= 5 && compactLine.includes(name));
    const lnInLine = (name) => normLine.includes(name) || (name.length >= 5 && compactLine.includes(name));

    // Dokładne + zdrobnienia
    const matches = db.participants.filter(p => {
      const fn = normalize(p.firstName);
      const ln = normalize(p.lastName);
      if (!fn && !ln) return false;
      if (!fn) return lnInLine(ln);
      if (!ln) return fnInLine(fn);
      return normLine.includes(fn + ' ' + ln) || normLine.includes(ln + ' ' + fn)
          || compactLine.includes(fn + ln) || compactLine.includes(ln + fn)
          || (fnInLine(fn) && lnInLine(ln));
    });
    // Przybliżone dopasowanie (błędy kodowania) — tylko gdy dokładne nic nie dało
    let fuzzy = false;
    let fuzzyMatches = [];
    if (matches.length === 0) {
      fuzzyMatches = db.participants.filter(p => {
        const fn = normalize(p.firstName);
        const ln = normalize(p.lastName);
        if (!fn && !ln) return false;
        const fnOk = fn ? (fnInLine(fn) || nameFuzzyInLine(fn, normLine)) : true;
        const lnOk = ln ? (lnInLine(ln) || nameFuzzyInLine(ln, normLine)) : true;
        // Musi być przynajmniej jedno rzeczywiste fuzzy trafienie
        const hasFuzzyHit = (fn ? nameFuzzyInLine(fn, normLine) : false)
                         || (ln ? nameFuzzyInLine(ln, normLine) : false);
        return fnOk && lnOk && hasFuzzyHit;
      });
      if (fuzzyMatches.length > 0) fuzzy = true;
    }
    const detectedMonths = detectTransferMonths(line, date);
    return { line, date, matches: fuzzy ? fuzzyMatches : matches, fuzzy, detectedMonths };
  });

  const matchedLines = [];
  const pairLines = [];      // przelew pasuje do pary — oboje zapłacili
  const ambiguousLines = [];
  const unmatchedLines = [];
  const suggestedLines = []; // przybliżone (fuzzy) dopasowanie — wymaga potwierdzenia

  // Detect "Pakiet Kobieta" transfers — Lady Dance + FitDance multi-course package
  function isKobietaPacket(line) {
    const n = normalize(line);
    return /pakiet\s*kobiet/i.test(n) || /\bkobieta\b/i.test(n) || /fit\s*[\+&]\s*lady/i.test(n) || /lady\s*[\+&]\s*fit/i.test(n);
  }
  function isLadyFitLinked(p) {
    if (!p.linkedId) return false;
    const group = db.participants.filter(x => x.linkedId === p.linkedId);
    const groups = group.map(x => normalize(x.group));
    return groups.some(g => g.includes('lady')) && groups.some(g => g.includes('fit'));
  }

  results.forEach(r => {
    if (r.fuzzy) {
      // Przybliżone dopasowanie — wymaga potwierdzenia w panelu ręcznej korekty
      if (r.matches.length === 1) suggestedLines.push(r);
      else if (r.matches.length > 1) ambiguousLines.push(r);
      else unmatchedLines.push(r);
    } else if (r.matches.length === 0) {
      unmatchedLines.push(r);
    } else if (r.matches.length === 1) {
      // Check if this is a "Pakiet Kobieta" transfer for a Lady Dance + FitDance linked participant
      const m = r.matches[0];
      if (isKobietaPacket(r.line) && isLadyFitLinked(m)) {
        const allLinked = db.participants.filter(x => x.linkedId === m.linkedId);
        r.matches = allLinked;
        r.isLinked = true;
        pairLines.push(r);
      } else {
        matchedLines.push(r);
      }
    } else {
      // Check if all matches belong to the same pair / family / linked (multi-course)
      const pids = r.matches.map(m => m.pairId).filter(Boolean);
      const lids = r.matches.map(m => m.linkedId).filter(Boolean);
      // Resolve effective family ID: familyId → pairId → guardianId chain (handles missing familyId on children)
      const efids = r.matches.map(m => {
        if (m.familyId) return m.familyId;
        if (m.pairId)   return m.pairId;
        if (m.guardianId) {
          const g = db.participants.find(x => x.id === m.guardianId);
          if (g) return g.familyId || g.pairId || null;
        }
        return null;
      }).filter(Boolean);
      const sids = r.matches.map(m => m.siblingId).filter(Boolean);
      const isPair    = pids.length  === r.matches.length && new Set(pids).size  === 1;
      const isFamily  = efids.length === r.matches.length && new Set(efids).size === 1;
      const isLinked  = lids.length  === r.matches.length && new Set(lids).size  === 1;
      const isSibling = sids.length  === r.matches.length && new Set(sids).size  === 1;
      if (isPair || isFamily || isLinked || isSibling) {
        r.isFamily  = isFamily  && !isPair;
        r.isLinked  = isLinked  && !isPair && !isFamily;
        r.isSibling = isSibling && !isPair && !isFamily && !isLinked;
        pairLines.push(r);
      } else {
        ambiguousLines.push(r);
      }
    }
  });

  // Which participants are paid
  const paidIds = new Set();
  matchedLines.forEach(r => paidIds.add(r.matches[0].id));
  pairLines.forEach(r => r.matches.forEach(m => paidIds.add(m.id)));

  const paid = db.participants.filter(p => paidIds.has(p.id));
  const unpaid = db.participants.filter(p => !paidIds.has(p.id));

  pendingAnalysis = { results, matchedLines, pairLines, unmatchedLines, ambiguousLines, suggestedLines, paid, unpaid };

  // Policz ile dopasowanych przelewów należy do innego miesiąca
  const allMatchedRs = [...matchedLines, ...pairLines];
  const crossMonthCount = allMatchedRs.filter(r =>
    r.detectedMonths && r.detectedMonths.some(dm => dm.month !== currentMonth || dm.year !== currentYear)
  ).length;

  // Helper: chipy miesięcy dla przelewu (pokazuj tylko gdy ≠ bieżący miesiąc)
  function monthChipsHtml(r) {
    if (!r.detectedMonths || r.detectedMonths.length === 0) return '';
    const chips = r.detectedMonths
      .filter(dm => dm.month !== currentMonth || dm.year !== currentYear)
      .map(dm => {
        const lbl = MONTHS_PL[dm.month] + ' ' + dm.year;
        const style = dm.source === 'title'
          ? 'background:#fde68a;color:#92400e'
          : 'background:#e0f2fe;color:#0369a1';
        const hint = dm.source === 'title' ? 'z tytułu przelewu' : 'z daty przelewu';
        return `<span class="chip" style="${style}" title="${hint}">za ${lbl}</span>`;
      });
    return chips.join('');
  }

  // Stats
  document.getElementById('analysisStats').innerHTML = `
    <div class="stat-card"><div class="num">${lines.length}</div><div class="lbl">Przelewów razem</div></div>
    <div class="stat-card"><div class="num" style="color:var(--success)">${matchedLines.length}</div><div class="lbl">Dopasowanych</div></div>
    <div class="stat-card"><div class="num" style="color:#d97706">${pairLines.length}</div><div class="lbl">Par / Rodzin</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${unmatchedLines.length}</div><div class="lbl">Niedopasowanych</div></div>
    <div class="stat-card"><div class="num" style="color:var(--warning)">${ambiguousLines.length}</div><div class="lbl">Niejednoznacznych</div></div>
    ${suggestedLines.length > 0 ? `<div class="stat-card"><div class="num" style="color:#1e40af">${suggestedLines.length}</div><div class="lbl">Sugerowanych</div></div>` : ''}
    ${crossMonthCount > 0 ? `<div class="stat-card"><div class="num" style="color:#92400e">${crossMonthCount}</div><div class="lbl">Inny miesiąc</div></div>` : ''}
    <div class="stat-card"><div class="num" style="color:var(--success)">${paid.length}</div><div class="lbl">Zapłaciło</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${unpaid.length}</div><div class="lbl">Brak wpłaty</div></div>
  `;

  // Matched transfers
  const mt = [...matchedLines.map(r =>
    `<div class="match-item matched">✅ <span>${esc(r.line.substring(0,70))}${r.line.length>70?'…':''}</span> → <strong>${esc(r.matches[0].firstName)} ${esc(r.matches[0].lastName)}</strong> <span class="chip">${esc(r.matches[0].group)}</span>${monthChipsHtml(r)}</div>`
  ), ...pairLines.map(r => {
    const icon  = r.isLinked ? '🔗' : r.isFamily ? '👨‍👩‍👧' : r.isSibling ? '👫' : '🤝';
    const label = r.isLinked ? 'multi-kurs' : r.isFamily ? 'rodzina' : r.isSibling ? 'rodzeństwo' : 'para';
    const names = r.matches.map(m => esc((m.lastName + ' ' + m.firstName).trim()) + (r.isLinked ? ` <small>(${esc(m.group)})</small>` : '')).join(' & ');
    return `<div class="match-item matched">${icon} <span>${esc(r.line.substring(0,60))}</span> → <strong>${names}</strong> <span class="chip" style="background:#fde68a;color:#92400e">${label}</span>${monthChipsHtml(r)}</div>`;
  }), ...ambiguousLines.map(r =>
    `<div class="match-item ambiguous">⚠️ <span>${esc(r.line.substring(0,60))}</span> → ${r.matches.map(m=>esc(m.firstName+' '+m.lastName)).join(', ')}</div>`
  ), ...suggestedLines.map(r =>
    `<div class="match-item suggested">🔍 <span>${esc(r.line.substring(0,60))}</span> → <em>${esc(r.matches[0].firstName+' '+r.matches[0].lastName)}</em> <small style="opacity:.75">(przybliżone — wymaga potwierdzenia)</small></div>`
  )].join('');
  document.getElementById('matchedTransfers').innerHTML = mt || '<div class="empty-state" style="padding:20px">Brak</div>';

  document.getElementById('unmatchedTransfers').innerHTML = unmatchedLines.length
    ? unmatchedLines.map(r => `<div class="match-item unmatched">❌ ${esc(r.line.substring(0,80))}${r.line.length>80?'…':''}</div>`).join('')
    : '<div style="color:var(--success);padding:12px;text-align:center;font-weight:600">🎉 Wszystkie przelewy dopasowane!</div>';

  const sortedPaid = [...paid].sort((a,b)=>a.lastName.localeCompare(b.lastName,'pl'));
  const sortedUnpaid = [...unpaid].sort((a,b)=>a.lastName.localeCompare(b.lastName,'pl'));

  document.getElementById('paidParticipants').innerHTML = sortedPaid.length
    ? sortedPaid.map(p=>`<div class="match-item matched">💚 ${esc(p.lastName)} ${esc(p.firstName)} <span class="chip">${esc(p.group)}</span></div>`).join('')
    : '<div class="empty-state" style="padding:20px">Nikt nie zapłacił</div>';

  document.getElementById('unpaidParticipants').innerHTML = sortedUnpaid.length
    ? sortedUnpaid.map(p=>`<div class="match-item unmatched">🔴 ${esc(p.lastName)} ${esc(p.firstName)} <span class="chip">${esc(p.group)}</span></div>`).join('')
    : '<div style="color:var(--success);padding:12px;text-align:center;font-weight:600">🎉 Wszyscy zapłacili!</div>';

  document.getElementById('analysisSection').style.display = 'block';
  document.getElementById('savePaymentsBtn').style.display = 'inline-flex';

  // Debug log
  const hasDebug = ambiguousLines.length > 0 || unmatchedLines.length > 0 || suggestedLines.length > 0;
  const debugCard = document.getElementById('debugLogCard');
  debugCard.style.display = hasDebug ? 'block' : 'none';
  if (hasDebug) {
    document.getElementById('debugLogContent').innerHTML = buildDebugLog(ambiguousLines, unmatchedLines, suggestedLines);
    document.getElementById('debugLogBody').style.display = 'none';
    document.getElementById('debugLogToggle').textContent = '▼ rozwiń';
  }
}

function toggleDebugLog() {
  const body = document.getElementById('debugLogBody');
  const toggle = document.getElementById('debugLogToggle');
  const visible = body.style.display !== 'none';
  body.style.display = visible ? 'none' : 'block';
  toggle.textContent = visible ? '▼ rozwiń' : '▲ zwiń';
}

function buildDebugLog(ambiguousLines, unmatchedLines, suggestedLines = []) {
  const rows = [];

  // --- Przybliżone dopasowania (błędy kodowania) ---
  suggestedLines.forEach(r => {
    const normLine = normalize(r.line);
    rows.push(`<div style="border-bottom:1px solid #bfdbfe;padding:6px 0">`);
    rows.push(`<div style="color:#1e40af;font-weight:600">🔍 PRZYBLIŻONE DOPASOWANIE — wymaga potwierdzenia</div>`);
    rows.push(`<div style="color:#555;word-break:break-all">Przelew: <span style="color:#111">${esc(r.line)}</span></div>`);
    rows.push(`<div style="color:#555">Znormalizowany: <span style="color:#111">${esc(normLine)}</span></div>`);
    r.matches.forEach(m => {
      const fn = normalize(m.firstName), ln = normalize(m.lastName);
      const fnFuzzy = fn && nameFuzzyInLine(fn, normLine);
      const lnFuzzy = ln && nameFuzzyInLine(ln, normLine);
      const hints = [];
      if (fnFuzzy) hints.push(`imię "${m.firstName}" (znaki diakrytyczne?)`);
      if (lnFuzzy) hints.push(`nazwisko "${m.lastName}" (znaki diakrytyczne?)`);
      rows.push(`<div style="color:#1e40af">  → ${esc(m.lastName)} ${esc(m.firstName)} <span class="chip" style="font-size:.7rem">${esc(m.group)}</span> — przybliżone przez: ${hints.join(', ')}</div>`);
    });
    rows.push(`<div style="color:#6b7280;font-size:.77rem;margin-top:2px">  ℹ Możliwy błąd kodowania znaków w pliku bankowym (np. ą→ś). Potwierdź ręcznie w panelu korekty.</div>`);
    rows.push(`</div>`);
  });

  // --- Niejednoznaczne ---
  ambiguousLines.forEach(r => {
    const normLine = normalize(r.line);
    rows.push(`<div style="border-bottom:1px solid #fde68a;padding:6px 0">`);
    rows.push(`<div style="color:#92400e;font-weight:600">⚠️ NIEJEDNOZNACZNY</div>`);
    rows.push(`<div style="color:#555;word-break:break-all">Przelew: <span style="color:#111">${esc(r.line)}</span></div>`);
    rows.push(`<div style="color:#555">Znormalizowany: <span style="color:#111">${esc(normLine)}</span></div>`);
    r.matches.forEach(m => {
      const fn = normalize(m.firstName);
      const ln = normalize(m.lastName);
      const hitFn = fn && nameInLine(fn, normLine);
      const hitLn = ln && normLine.includes(ln);
      const hitPair = fn && ln && (normLine.includes(fn+' '+ln) || normLine.includes(ln+' '+fn));
      let reason = [];
      if (hitPair) reason.push(`imię+nazwisko razem`);
      else { if (hitFn) reason.push(`imię "${m.firstName}"`); if (hitLn) reason.push(`nazwisko "${m.lastName}"`); }
      rows.push(`<div style="color:#b45309">  → ${esc(m.lastName)} ${esc(m.firstName)} <span class="chip" style="font-size:.7rem">${esc(m.group)}</span> — pasuje przez: ${reason.join(' i ')}</div>`);
    });
    rows.push(`</div>`);
  });

  // --- Niedopasowane ---
  unmatchedLines.forEach(r => {
    const normLine = normalize(r.line);
    const compactLine = normLine.replace(/\s+/g, '');
    const nearMisses = db.participants.filter(p => {
      const fn = normalize(p.firstName);
      const ln = normalize(p.lastName);
      const fnHit = fn && (normLine.includes(fn) || (fn.length >= 5 && compactLine.includes(fn)));
      const lnHit = ln && (normLine.includes(ln) || (ln.length >= 5 && compactLine.includes(ln)));
      return fnHit || lnHit;
    }).slice(0, 5);

    // Czy jakiekolwiek nazwisko (token ≥4 znaków) w ogóle istnieje w bazie?
    const lineTokens = normLine.split(/[^a-z]+/).filter(t => t.length >= 4);
    const anyLastNameInDb = nearMisses.length > 0 ||
      db.participants.some(p => { const ln = normalize(p.lastName); return ln && lineTokens.includes(ln); });

    rows.push(`<div style="border-bottom:1px solid #fecaca;padding:6px 0">`);
    rows.push(`<div style="color:#dc2626;font-weight:600">❌ NIEDOPASOWANY</div>`);
    rows.push(`<div style="color:#555;word-break:break-all">Przelew: <span style="color:#111">${esc(r.line)}</span></div>`);
    rows.push(`<div style="color:#555">Znormalizowany: <span style="color:#111">${esc(normLine)}</span></div>`);
    if (nearMisses.length) {
      rows.push(`<div style="color:#555">Częściowe dopasowania (tylko jeden token):</div>`);
      nearMisses.forEach(m => {
        const fn = normalize(m.firstName);
        const ln = normalize(m.lastName);
        const hitFn = fn && (nameInLine(fn, normLine) || (fn.length >= 5 && compactLine.includes(fn)));
        const hitLn = ln && (normLine.includes(ln) || (ln.length >= 5 && compactLine.includes(ln)));
        let hits = [];
        if (hitFn) hits.push(`imię "${m.firstName}"`);
        if (hitLn) hits.push(`nazwisko "${m.lastName}"`);
        rows.push(`<div style="color:#6b7280">  → ${esc(m.lastName)} ${esc(m.firstName)} <span class="chip" style="font-size:.7rem">${esc(m.group)}</span> — znaleziono: ${hits.join(', ')} | brakuje: ${!hitFn?`imię "${m.firstName}"`:`nazwisko "${m.lastName}"`}</div>`);
      });
    } else {
      rows.push(`<div style="color:#dc2626;font-weight:600;margin-top:4px">  ⚠️ Żadne imię ani nazwisko z tego przelewu nie istnieje w bazie — sprawdź czy uczestnik został dodany do systemu.</div>`);
    }
    rows.push(`</div>`);
  });

  return rows.join('');
}

function clearAnalysis() {
  document.getElementById('analysisSection').style.display = 'none';
  document.getElementById('savePaymentsBtn').style.display = 'none';
  document.getElementById('transferInput').value = '';
  pendingAnalysis = null;
}

function savePayments() {
  if (!pendingAnalysis) return;
  const key = monthKey();
  const now = new Date().toISOString();

  // Wyznacz docelowe miesiące dla danego przelewu na podstawie detectedMonths
  function getTargetKeys(r) {
    if (!r.detectedMonths || r.detectedMonths.length === 0) return [key];
    return r.detectedMonths.map(dm => {
      const y = dm.year;
      const m = String(dm.month + 1).padStart(2, '0');
      return `${y}-${m}`;
    });
  }

  // Zbierz wszystkie pary (uczestnik, docelowy miesiąc) ze wszystkich dopasowań
  const allPairs = [];
  pendingAnalysis.matchedLines.forEach(r => {
    const p = r.matches[0];
    getTargetKeys(r).forEach(tk => allPairs.push({ participantId: p.id, title: r.line, savedAt: now, targetKey: tk, participant: p }));
  });
  pendingAnalysis.pairLines.forEach(r => {
    getTargetKeys(r).forEach(tk => {
      r.matches.forEach(m => allPairs.push({ participantId: m.id, title: r.line, savedAt: now, targetKey: tk, participant: m }));
    });
  });

  // Grupuj po targetKey i zapisz do każdego miesiąca osobno
  const byKey = {};
  allPairs.forEach(e => { (byKey[e.targetKey] = byKey[e.targetKey] || []).push(e); });

  const crossEntries = [];
  Object.entries(byKey).forEach(([tk, pairs]) => {
    // Zachowaj ręczne wpłaty gotówkowe, nadpisz tylko bankowe
    const manualEntries = (db.payments[tk] || []).filter(e => e.manual);
    const seen = new Set(manualEntries.map(e => e.participantId));
    const newEntries = pairs.filter(e => {
      if (seen.has(e.participantId)) return false;
      seen.add(e.participantId);
      return true;
    }).map(e => ({ participantId: e.participantId, title: e.title, savedAt: e.savedAt }));
    db.payments[tk] = [...manualEntries, ...newEntries];

    // Zbierz wpłaty trafiające do innych miesięcy niż bieżący
    if (tk !== key) {
      newEntries.forEach(e => {
        const p = pairs.find(pair => pair.participantId === e.participantId)?.participant;
        if (p) crossEntries.push({ participantId: p.id, firstName: p.firstName, lastName: p.lastName, group: p.group, monthKey: tk });
      });
    }
  });

  // Zapamiętaj wpłaty cross-month do wyświetlenia w savedMonthCard
  lastSaveSession = crossEntries.length > 0 ? { currentKey: key, crossEntries } : null;

  // Zapisz nierozwiązane przelewy do panelu ręcznej korekty (zawsze bieżący miesiąc)
  if (!db.pendingReview) db.pendingReview = {};
  if (!db.pendingReview[key]) db.pendingReview[key] = [];
  const existingLines = new Set(db.pendingReview[key].map(i => i.line));

  function buildSuggestions(normLine) {
    return db.participants.filter(p => {
      const fn = normalize(p.firstName);
      const ln = normalize(p.lastName);
      return (fn && nameInLine(fn, normLine)) || (ln && normLine.includes(ln));
    }).slice(0, 6).map(p => {
      const fn = normalize(p.firstName), ln = normalize(p.lastName);
      const hits = [];
      if (fn && nameInLine(fn, normLine)) hits.push(`imię "${p.firstName}"`);
      if (ln && normLine.includes(ln)) hits.push(`nazwisko "${p.lastName}"`);
      return { participantId: p.id, reason: hits.join(', ') };
    });
  }

  const toReview = [
    ...(pendingAnalysis.unmatchedLines || []).map(r => ({
      id: uid(), line: r.line, type: 'unmatched',
      suggestions: buildSuggestions(normalize(r.line)),
      status: 'pending', resolvedParticipantId: null, savedAt: null
    })),
    ...(pendingAnalysis.ambiguousLines || []).map(r => ({
      id: uid(), line: r.line, type: 'ambiguous',
      suggestions: r.matches.map(m => ({ participantId: m.id, reason: 'niejednoznaczne dopasowanie' })),
      status: 'pending', resolvedParticipantId: null, savedAt: null
    })),
    ...(pendingAnalysis.suggestedLines || []).map(r => ({
      id: uid(), line: r.line, type: 'fuzzy',
      suggestions: r.matches.map(m => ({ participantId: m.id, reason: 'przybliżone dopasowanie (błąd kodowania?)' })),
      status: 'pending', resolvedParticipantId: null, savedAt: null
    }))
  ];
  toReview.forEach(item => {
    if (!existingLines.has(item.line)) db.pendingReview[key].push(item);
  });

  saveDb();
  document.getElementById('savePaymentsBtn').textContent = '✅ Zapisano!';
  setTimeout(() => {
    clearAnalysis();
    renderSavedMonth();
    renderManualReview();
    renderStats();
  }, 900);
}

function renderSavedMonth() {
  const key = monthKey();
  const entries = db.payments[key];
  const card = document.getElementById('savedMonthCard');
  if (!entries || entries.length === 0) { card.style.display = 'none'; return; }

  card.style.display = 'block';
  document.getElementById('savedMonthTitle').textContent = '📋 Zapisane wpłaty: ' + MONTHS_PL[currentMonth] + ' ' + currentYear;

  const paidIds = new Set(entries.map(e => e.participantId));
  const manualIds = new Set(entries.filter(e => e.manual).map(e => e.participantId));
  const paidPs = db.participants.filter(p => paidIds.has(p.id)).sort((a,b) => (a.lastName||'').localeCompare(b.lastName||'','pl'));
  const unpaidPs = db.participants.filter(p => !paidIds.has(p.id)).sort((a,b) => (a.lastName||'').localeCompare(b.lastName||'','pl'));

  const pct = db.participants.length ? Math.round(paidPs.length/db.participants.length*100) : 0;

  const crossMonthHtml = (() => {
    if (!lastSaveSession || lastSaveSession.currentKey !== key || lastSaveSession.crossEntries.length === 0) return '';
    const rows = lastSaveSession.crossEntries.map(e => {
      const parts = e.monthKey.split('-');
      const monthLabel = MONTHS_PL[parseInt(parts[1])-1] + ' ' + parts[0];
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0eafa">
        <span class="chip" style="background:#fef3c7;color:#92400e">${monthLabel}</span>
        ${esc(e.lastName)}${e.firstName ? ' ' + esc(e.firstName) : ''} <span class="chip">${esc(e.group)}</span>
      </div>`;
    }).join('');
    return `<div style="margin-top:16px"><div class="section-title">📤 Przypisane do innych miesięcy</div>${rows}</div>`;
  })();

  document.getElementById('savedMonthContent').innerHTML = `
    <div class="row" style="gap:16px;margin-bottom:12px">
      <span class="badge badge-success">Zapłacili: ${paidPs.length}</span>
      <span class="badge badge-danger">Brak wpłaty: ${unpaidPs.length}</span>
      <span class="badge badge-info">Łącznie: ${db.participants.length}</span>
    </div>
    <div class="progress-bar" style="margin-bottom:16px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="two-col">
      <div>
        <div class="section-title">✅ Zapłacili</div>
        ${paidPs.map(p => {
          const isManual = manualIds.has(p.id);
          const icon = isManual
            ? `<span title="Gotówka / ręczna wpłata" style="cursor:default">💵</span>`
            : `<span class="badge badge-success">✓</span>`;
          const del = isManual
            ? `<button onclick="deleteManualEntry('${key}','${p.id}')" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;padding:2px 7px;margin-left:auto" title="Usuń ręczną wpłatę">✕</button>`
            : '';
          return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0eafa">
            ${icon} ${esc(p.lastName)}${p.firstName ? ' ' + esc(p.firstName) : ''} <span class="chip">${esc(p.group)}</span>${del}
          </div>`;
        }).join('')}
      </div>
      <div>
        <div class="section-title">❌ Brak wpłaty</div>
        ${unpaidPs.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0eafa">
          <span class="badge badge-danger">✗</span> ${esc(p.lastName)}${p.firstName ? ' ' + esc(p.firstName) : ''} <span class="chip">${esc(p.group)}</span>
        </div>`).join('')}
      </div>
    </div>
    ${crossMonthHtml}
    <div style="margin-top:14px">
      <button class="btn btn-outline btn-sm" onclick="deleteMonthPayments('${key}')">🗑 Usuń wszystkie wpłaty za ten miesiąc</button>
    </div>`;
}

function deleteMonthPayments(key) {
  if (!confirm('Usunąć wszystkie wpłaty za ten miesiąc?')) return;
  delete db.payments[key];
  saveDb();
  renderSavedMonth();
  renderStats();
}

// ===================== PŁATNOŚCI (gotówka / brak) =====================
function renderPlatnosci() {
  const key = monthKey();
  const entries = db.payments[key] || [];
  const noPaySet = new Set(db.confirmedNoPayment[key] || []);

  function getStatus(p) {
    const e = entries.find(x => x.participantId === p.id);
    if (e && !e.manual) return 'transfer';
    if (e && e.manual)  return 'cash';
    if (noPaySet.has(p.id)) return 'nopay';
    return 'unknown';
  }

  // Stats
  const counts = { transfer: 0, cash: 0, nopay: 0, unknown: 0 };
  db.participants.forEach(p => counts[getStatus(p)]++);

  const statsEl = document.getElementById('platnosciStats');
  if (!statsEl) return; // tab not in DOM yet
  statsEl.innerHTML = `
    <div class="stat-card"><div class="num" style="color:var(--success)">${counts.transfer}</div><div class="lbl">Przelew</div></div>
    <div class="stat-card"><div class="num" style="color:#2563eb">${counts.cash}</div><div class="lbl">Gotówka</div></div>
    <div class="stat-card"><div class="num" style="color:var(--danger)">${counts.nopay}</div><div class="lbl">Brak opłaty</div></div>
    <div class="stat-card"><div class="num" style="color:var(--text-muted)">${counts.unknown}</div><div class="lbl">Nieznany</div></div>
  `;

  // Group filter
  const gf = document.getElementById('platnosciGroupFilter');
  const prevGroup = gf.value;
  const groups = getGroups();
  gf.innerHTML = '<option value="">Wszystkie grupy</option>' +
    groups.map(g => `<option value="${esc(g)}"${g === prevGroup ? ' selected' : ''}>${esc(g)}</option>`).join('');
  const groupFilter = gf.value;
  const onlyUnknown = document.getElementById('platnosciOnlyUnknown').checked;
  const searchQ = (document.getElementById('platnosciSearch').value || '').toLowerCase().trim();

  // Filter + sort
  let ps = db.participants;
  if (groupFilter) ps = ps.filter(p => p.group === groupFilter);
  if (onlyUnknown) ps = ps.filter(p => getStatus(p) === 'unknown');
  if (searchQ) ps = ps.filter(p => {
    const full = ((p.lastName || '') + ' ' + (p.firstName || '')).toLowerCase();
    return full.includes(searchQ);
  });
  ps = [...ps].sort((a, b) => {
    const gc = (a.group || '').localeCompare(b.group || '', 'pl');
    return gc !== 0 ? gc : (a.lastName || '').localeCompare(b.lastName || '', 'pl');
  });

  if (ps.length === 0) {
    const icon = onlyUnknown ? '✅' : (searchQ ? '🔍' : '👥');
    const msg  = onlyUnknown ? 'Wszyscy mają określony status!' : (searchQ ? `Brak wyników dla „${searchQ}".` : 'Brak uczestników.');
    document.getElementById('platnosciList').innerHTML =
      `<div class="empty-state"><div class="icon">${icon}</div><div>${msg}</div></div>`;
    return;
  }

  function statusChip(status) {
    return {
      transfer: `<span class="badge badge-success">✅ Przelew</span>`,
      cash:     `<span class="badge" style="background:#dbeafe;color:#1d4ed8">💵 Gotówka</span>`,
      nopay:    `<span class="badge badge-danger">❌ Brak opłaty</span>`,
      unknown:  `<span class="badge badge-gray">❓ Nieznany</span>`,
    }[status];
  }

  function actionBtns(p, status) {
    const pid = p.id;
    if (status === 'transfer') return '';
    if (status === 'cash')
      return `<button onclick="undoCash('${key}','${pid}')" class="btn btn-ghost btn-sm">↩ Cofnij</button>`;
    if (status === 'nopay')
      return `<button onclick="undoNoPay('${key}','${pid}')" class="btn btn-ghost btn-sm">↩ Cofnij</button>`;
    return `<button onclick="markCash('${key}','${pid}')" class="btn btn-sm" style="background:#dbeafe;color:#1d4ed8;border:none">💵 Gotówka</button>
            <button onclick="markNoPay('${key}','${pid}')" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none">❌ Brak</button>`;
  }

  let lastGroup = null;
  const rows = ps.map(p => {
    const status = getStatus(p);
    let header = '';
    if (!groupFilter && p.group !== lastGroup) {
      lastGroup = p.group;
      header = `<div class="pay-group-header">${esc(p.group)}</div>`;
    }
    const name = `${esc(p.lastName)}${p.firstName ? ' ' + esc(p.firstName) : ''}`;
    const groupChip = groupFilter ? `<span class="chip">${esc(p.group)}</span>` : '';
    return `${header}<div class="pay-row">
      <div class="pay-name">${name}</div>
      ${groupChip}
      ${statusChip(status)}
      <div style="display:flex;gap:6px;margin-left:auto">${actionBtns(p, status)}</div>
    </div>`;
  }).join('');

  document.getElementById('platnosciList').innerHTML = rows;
}

function markCash(key, participantId) {
  if (!db.payments[key]) db.payments[key] = [];
  if (db.payments[key].some(e => e.participantId === participantId)) return;
  db.payments[key].push({ participantId, title: 'Gotówka', manual: true, savedAt: new Date().toISOString() });
  const p = db.participants.find(x => x.id === participantId);
  if (p) {
    // Para taneczna — zalicz obojgu
    if (p.pairId) {
      const partner = db.participants.find(x => x.id !== participantId && x.pairId === p.pairId);
      if (partner && !db.payments[key].some(e => e.participantId === partner.id))
        db.payments[key].push({ participantId: partner.id, title: 'Gotówka', manual: true, savedAt: new Date().toISOString() });
    }
    // Multi-kurs (linkedId) — ta sama osoba w kilku grupach (np. Lady Dance + FitDance = Pakiet Kobieta)
    if (p.linkedId) {
      db.participants.filter(x => x.id !== participantId && x.linkedId === p.linkedId).forEach(linked => {
        if (!db.payments[key].some(e => e.participantId === linked.id))
          db.payments[key].push({ participantId: linked.id, title: 'Gotówka', manual: true, savedAt: new Date().toISOString() });
      });
    }
  }
  saveDb(); renderPlatnosci(); renderSavedMonth(); renderStats();
}

function undoCash(key, participantId) {
  if (!db.payments[key]) return;
  db.payments[key] = db.payments[key].filter(e => !(e.participantId === participantId && e.manual));
  if (db.payments[key].length === 0) delete db.payments[key];
  saveDb(); renderPlatnosci(); renderSavedMonth(); renderStats();
}

function markNoPay(key, participantId) {
  if (!db.confirmedNoPayment[key]) db.confirmedNoPayment[key] = [];
  if (!db.confirmedNoPayment[key].includes(participantId))
    db.confirmedNoPayment[key].push(participantId);
  saveDb(); renderPlatnosci();
}

function undoNoPay(key, participantId) {
  if (!db.confirmedNoPayment[key]) return;
  db.confirmedNoPayment[key] = db.confirmedNoPayment[key].filter(id => id !== participantId);
  saveDb(); renderPlatnosci();
}

// ===================== STATISTICS =====================
function renderStats() {
  const allMonths = Object.keys(db.payments).sort();
  const groups = getGroups();

  // --- Filtr roku ---
  const yf = document.getElementById('statsYearFilter');
  const prevYear = yf.value;
  const availableYears = [...new Set(allMonths.map(m => m.slice(0,4)))].sort();
  const yearDefault = String(currentYear);
  yf.innerHTML = '<option value="">Wszystkie lata</option>' +
    availableYears.map(y => `<option value="${y}">${y}</option>`).join('');
  // Domyślnie bieżący rok; przy ponownym renderze przywróć poprzedni wybór
  yf.value = prevYear || yearDefault;
  if (!yf.value) yf.value = availableYears[availableYears.length - 1] || '';
  const selectedYear = yf.value;

  // --- Filtr grupy ---
  const sf = document.getElementById('statsGroupFilter');
  const cv = sf.value;
  sf.innerHTML = '<option value="">Wszystkie grupy</option>' +
    groups.map(g=>`<option value="${esc(g)}"${g===cv?' selected':''}>${esc(g)}</option>`).join('');
  const groupF = sf.value;

  // Miesiące widoczne w tabeli (po filtrze roku)
  const visibleMonths = selectedYear
    ? allMonths.filter(m => m.startsWith(selectedYear))
    : allMonths;

  // Global stats (zawsze z całej bazy)
  const totalParticipants = db.participants.length;
  document.getElementById('globalStats').innerHTML = `
    <div class="stat-card"><div class="num">${totalParticipants}</div><div class="lbl">Uczestników</div></div>
    <div class="stat-card"><div class="num">${allMonths.length}</div><div class="lbl">Miesięcy z danymi</div></div>
    <div class="stat-card"><div class="num">${groups.length}</div><div class="lbl">Grup</div></div>
    <div class="stat-card"><div class="num">${Object.values(db.payments).reduce((s,a)=>s+new Set(a.map(e=>e.participantId)).size,0)}</div><div class="lbl">Wpłat łącznie</div></div>
  `;

  if (totalParticipants === 0) {
    document.getElementById('statsTableWrap').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>Brak uczestników</div></div>';
    return;
  }

  const filtered = db.participants
    .filter(p => !groupF || p.group === groupF)
    .sort((a,b) => (a.lastName||'').localeCompare(b.lastName||'','pl'));

  if (filtered.length === 0) {
    document.getElementById('statsTableWrap').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>Brak uczestników w tej grupie</div></div>';
    return;
  }

  if (visibleMonths.length === 0) {
    const info = selectedYear ? `Brak zapisanych wpłat za rok ${selectedYear}.` : 'Brak danych o wpłatach.';
    document.getElementById('statsTableWrap').innerHTML = `<div class="empty-state"><div class="icon">📅</div><div>${info}</div></div>`;
    return;
  }

  const monthHeaders = visibleMonths.map(m => {
    const [y, mo] = m.split('-');
    return `<th style="text-align:center;min-width:52px">${MONTHS_PL[parseInt(mo)-1].substring(0,3)}<br><small style="font-weight:400;opacity:.7">${y}</small></th>`;
  }).join('');

  const rows = filtered.map(p => {
    let payCount = 0;
    const cells = visibleMonths.map(m => {
      const entry = (db.payments[m]||[]).find(e => e.participantId === p.id);
      if (entry) payCount++;
      const cell = entry
        ? entry.manual
          ? '<span title="Gotówka / ręczna wpłata">💵</span>'
          : '<span style="color:var(--success);font-size:1.1rem">✓</span>'
        : '<span style="color:#e5e7eb;font-size:1rem">–</span>';
      return `<td style="text-align:center">${cell}</td>`;
    }).join('');
    const pct = visibleMonths.length ? Math.round(payCount / visibleMonths.length * 100) : 0;
    const badge = pct>=80?'badge-success':pct>=50?'badge-warning':'badge-danger';
    return `<tr>
      <td><strong>${esc(p.lastName)}</strong>${p.firstName ? ' ' + esc(p.firstName) : ''}</td>
      <td><span class="chip">${esc(p.group)}</span></td>
      <td style="text-align:center"><strong>${payCount}</strong>/${visibleMonths.length}</td>
      <td><span class="badge ${badge}">${pct}%</span></td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('statsTableWrap').innerHTML = `
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>Uczestnik</th><th>Grupa</th><th>Wpłaty</th><th>%</th>
        ${monthHeaders}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`;
}

function exportStats() {
  const selectedYear = document.getElementById('statsYearFilter').value;
  const allMonths = Object.keys(db.payments).sort();
  const months = selectedYear ? allMonths.filter(m => m.startsWith(selectedYear)) : allMonths;
  const header = ['Nazwisko','Imię','Grupa','Liczba wpłat','Procent', ...months].join(';');
  const rows = db.participants.sort((a,b) => (a.lastName||'').localeCompare(b.lastName||'','pl')).map(p => {
    const pays = months.map(m => {
      const entry = (db.payments[m]||[]).find(e => e.participantId === p.id);
      if (!entry) return '';
      return entry.manual ? 'G' : 'P';
    });
    const count = pays.filter(x => x !== '').length;
    const pct = months.length ? Math.round(count/months.length*100)+'%' : '0%';
    return [p.lastName, p.firstName, p.group, count, pct, ...pays].join(';');
  });
  const legend = ['Legenda: P = przelew bankowy  |  G = gotówka (ręczna wpłata)  |  (puste) = brak wpłaty','','','','',''].join(';');
  const csv = [legend, header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wplaty_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ===================== AUTO-BACKUP (File System Access API) =====================

// IndexedDB — przechowuje handle do folderu między sesjami
function openBackupIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('taniec_backup_v1', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('handles');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
async function saveHandleToIDB(handle) {
  const idb = await openBackupIDB();
  return new Promise((resolve, reject) => {
    const tx = idb.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(handle, 'backupDir');
    tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);
  });
}
async function loadHandleFromIDB() {
  try {
    const idb = await openBackupIDB();
    return new Promise(resolve => {
      const tx = idb.transaction('handles', 'readonly');
      const req = tx.objectStore('handles').get('backupDir');
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}
async function clearHandleFromIDB() {
  try {
    const idb = await openBackupIDB();
    const tx = idb.transaction('handles', 'readwrite');
    tx.objectStore('handles').delete('backupDir');
  } catch { /* ignore */ }
}

// Zapis do backup_auto.json
async function writeBackupFile() {
  if (!backupDirHandle) return;
  try {
    const fh = await backupDirHandle.getFileHandle('backup_auto.json', { create: true });
    const writable = await fh.createWritable();
    await writable.write(JSON.stringify(db, null, 2));
    await writable.close();
    LSset('taniec_last_backup', new Date().toISOString());
    updateBackupStatusUI();
  } catch (e) {
    console.warn('Auto-zapis nie powiódł się:', e);
    if (e.name === 'NotAllowedError') {
      isFileConnected = false;
      updateBackupStatusUI();
    }
  }
}

// Odczyt z backup_auto.json (gdy localStorage puste)
async function readBackupFile() {
  if (!backupDirHandle) return null;
  try {
    const fh = await backupDirHandle.getFileHandle('backup_auto.json');
    const file = await fh.getFile();
    return JSON.parse(await file.text());
  } catch { return null; }
}

// Pierwsze połączenie — użytkownik wskazuje folder
async function connectBackupDir() {
  if (!('showDirectoryPicker' in window)) {
    alert('Twoja przeglądarka nie obsługuje auto-zapisu.\nUżyj Chrome lub Edge albo korzystaj z ręcznego eksportu.');
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    backupDirHandle = handle;
    isFileConnected = true;
    await saveHandleToIDB(handle);
    await writeBackupFile();   // natychmiastowy zapis po podłączeniu
    updateBackupStatusUI();
  } catch (e) {
    if (e.name !== 'AbortError') console.error('Błąd łączenia:', e);
  }
}

// Wznowienie po odświeżeniu — wymaga kliknięcia (gesty użytkownika)
async function resumeFileConnection() {
  if (!backupDirHandle) { connectBackupDir(); return; }
  try {
    const perm = await backupDirHandle.requestPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      isFileConnected = true;
      dismissResumeBar();
      await writeBackupFile();
      updateBackupStatusUI();
    }
  } catch (e) {
    console.warn('Nie udało się wznowić połączenia:', e);
  }
}

function disconnectBackupDir() {
  backupDirHandle = null;
  isFileConnected = false;
  clearHandleFromIDB();
  updateBackupStatusUI();
}

function dismissResumeBar() {
  document.getElementById('backupResumeBar').classList.remove('show');
}

// Sprawdź wiek ostatniego backup (w dniach)
function backupAgeDays() {
  const last = LSget('taniec_last_backup');
  if (!last) return Infinity;
  return (Date.now() - new Date(last).getTime()) / 86400000;
}

// Aktualizuje UI: chip w headerze, sekcja w Backup, pasek wznowienia
function updateBackupStatusUI() {
  const dot  = document.getElementById('backupDot');
  const text = document.getElementById('backupStatusText');
  const connectBtn    = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const statusDiv     = document.getElementById('autoBackupStatus');
  const noteDiv       = document.getElementById('autoBackupNote');
  const hasAPI = 'showDirectoryPicker' in window;

  if (!hasAPI) {
    // Safari / brak API — pokaż info o ograniczeniu
    if (dot) { dot.className = 'backup-dot off'; }
    if (text) text.textContent = '';
    if (noteDiv) noteDiv.style.display = '';
    if (connectBtn) connectBtn.style.display = 'none';
    if (statusDiv) {
      const age = backupAgeDays();
      const ageText = isFinite(age) ? `Ostatni backup: ${Math.round(age)} dni temu` : 'Brak backupu';
      const color = age > 7 ? '#dc2626' : '#16a34a';
      statusDiv.innerHTML = `<span style="color:${color};font-weight:600">⚠️ ${ageText}</span>
        <span style="color:var(--text-muted);font-size:.82rem;display:block;margin-top:4px">
          Auto-zapis nie jest dostępny w tej przeglądarce. Używaj ręcznego eksportu poniżej.
        </span>`;
    }
    return;
  }

  if (isFileConnected) {
    const last = LSget('taniec_last_backup');
    const timeText = last ? new Date(last).toLocaleTimeString('pl', { hour:'2-digit', minute:'2-digit' }) + ' ' + new Date(last).toLocaleDateString('pl') : '—';
    if (dot)  { dot.className = 'backup-dot ok'; }
    if (text) { text.textContent = 'Auto-zapis: aktywny'; text.style.color = '#4ade80'; }
    if (connectBtn)    connectBtn.style.display = 'none';
    if (disconnectBtn) disconnectBtn.style.display = '';
    if (statusDiv) statusDiv.innerHTML = `<span style="color:var(--success);font-weight:600">✅ Auto-zapis aktywny</span>
      <span style="color:var(--text-muted);font-size:.82rem;display:block;margin-top:4px">
        Ostatni zapis: ${timeText} → <code>backup_auto.json</code>
      </span>`;
  } else if (backupDirHandle) {
    // Handle jest, ale brak uprawnienia w tej sesji — pokaż pasek
    if (dot)  { dot.className = 'backup-dot warn'; }
    if (text) { text.textContent = 'Auto-zapis: wznów'; text.style.color = '#fbbf24'; }
    if (connectBtn)    connectBtn.textContent = '📁 Wskaż inny folder';
    if (disconnectBtn) disconnectBtn.style.display = '';
    if (statusDiv) statusDiv.innerHTML = `<span style="color:#d97706;font-weight:600">⚡ Wymagane ponowne zezwolenie</span>
      <span style="color:var(--text-muted);font-size:.82rem;display:block;margin-top:4px">
        Folder był podłączony wcześniej. Kliknij "Połącz" aby wznowić.
      </span>`;
    document.getElementById('backupResumeBar').classList.add('show');
    const age = backupAgeDays();
    if (age > 1) document.getElementById('backupResumeBar').classList.add('show');
  } else {
    // Brak konfiguracji
    if (dot)  { dot.className = 'backup-dot off'; }
    if (text) { text.textContent = 'Auto-zapis: wyłączony'; text.style.color = 'rgba(255,255,255,.5)'; }
    if (connectBtn)    { connectBtn.style.display = ''; connectBtn.textContent = '📁 Wskaż folder'; }
    if (disconnectBtn) disconnectBtn.style.display = 'none';
    const age = backupAgeDays();
    if (statusDiv) {
      const ageText = isFinite(age) ? `Ostatni ręczny backup: ${Math.round(age)} dni temu` : 'Brak backupu';
      const color = age > 7 ? '#dc2626' : 'var(--text-muted)';
      statusDiv.innerHTML = `<span style="color:${color}">💾 ${ageText}</span>
        <span style="color:var(--text-muted);font-size:.82rem;display:block;margin-top:4px">
          Wskaż folder z aplikacją aby włączyć auto-zapis.
        </span>`;
    }
    // Pokaż ostrzeżenie w headerze gdy backup stary
    if (age > 7 && dot) { dot.className = 'backup-dot warn'; }
  }
}

// Inicjalizacja auto-backup przy starcie
async function initAutoBackup() {
  const hasAPI = 'showDirectoryPicker' in window;
  if (!hasAPI) { updateBackupStatusUI(); return; }

  const handle = await loadHandleFromIDB();
  if (!handle) { updateBackupStatusUI(); return; }

  backupDirHandle = handle;

  // Sprawdź czy uprawnienie jest już aktywne (zdarza się gdy przeglądarka je pamięta)
  try {
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      isFileConnected = true;
      // Jeśli localStorage jest puste — odczytaj z pliku
      if (db.participants.length === 0) {
        const fileData = await readBackupFile();
        if (fileData && Array.isArray(fileData.participants) && fileData.participants.length > 0) {
          db = fileData;   // cały stan (też lessons/trainings/coaches/cloud — wcześniej gubione)
          saveDb();
          loadDb();        // domyślne pola + migracje (kind/price/date itd.)
          renderParticipants(); renderStats(); renderSavedMonth(); renderManualReview(); renderPlatnosci();
        }
      }
      await writeBackupFile();  // odśwież plik na starcie
    }
    // Jeśli 'prompt' — updateBackupStatusUI pokaże pasek wznowienia
  } catch { backupDirHandle = null; }

  updateBackupStatusUI();
}

// ===================== BACKUP =====================
function backupExport() {
  const payload = JSON.stringify(db, null, 2);
  const blob = new Blob([payload], { type: 'application/json;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  a.download = `takt_${(TAKT_CONFIG.schoolId||'szkola')}_backup_${date}.json`;
  a.click();
  LSset('taniec_last_backup', new Date().toISOString());
  updateBackupStatusUI();
  const info = document.getElementById('backupInfo');
  if (info) {
    const participants = db.participants.length;
    const months = Object.keys(db.payments).length;
    info.textContent = `✓ Pobrano backup: ${participants} uczestników, ${months} miesięcy historii.`;
  }
}

function backupImport(input) {
  const file = input.files[0];
  if (!file) return;
  const info = document.getElementById('importInfo');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.participants || !Array.isArray(parsed.participants)) {
        info.innerHTML = '<span style="color:var(--danger)">❌ Nieprawidłowy plik — brak listy uczestników.</span>';
        return;
      }
      if (!confirm(`Czy na pewno chcesz zastąpić obecne dane?\n\nBackup zawiera: ${parsed.participants.length} uczestników, ${Object.keys(parsed.payments||{}).length} miesięcy historii.`)) return;
      db = {
        participants: parsed.participants,
        payments: parsed.payments || {},
        pendingReview: parsed.pendingReview || {},
        confirmedNoPayment: parsed.confirmedNoPayment || {},
        lessons: parsed.lessons || [],
        trainers: parsed.trainers || ['Trener 1', 'Trener 2', 'Trener 3'],
        coaches: parsed.coaches || [],
        trainings: parsed.trainings || [],
        cloud: parsed.cloud || { trainerPin: '' }
      };
      // odtwórz typ/cenę lekcji po imporcie (zgodność ze starymi backupami)
      db.lessons.forEach(l => { if (!l.kind) l.kind = 'weekly'; if (l.price == null) l.price = 120; });
      saveDb();
      renderParticipants();
      renderStats();
      renderSavedMonth();
      renderManualReview();
      renderGrafik();
      info.innerHTML = `<span style="color:var(--success)">✅ Przywrócono: ${db.participants.length} uczestników, ${Object.keys(db.payments).length} miesięcy historii, ${db.lessons.length} lekcji.</span>`;
    } catch {
      info.innerHTML = '<span style="color:var(--danger)">❌ Błąd odczytu pliku — upewnij się że to plik backup z tej aplikacji.</span>';
    }
  };
  reader.readAsText(file, 'UTF-8');
  input.value = '';
}

// ===================== LINK DUPLICATES =====================
let dupCandidates = []; // [{ids: [id1, id2, ...], label}]

function normName(p) {
  const full = ((p.firstName || '') + ' ' + (p.lastName || '')).trim().toLowerCase();
  return full
    .replace(/\s*-\s*/g, ' ')
    .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l')
    .replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/ź/g,'z').replace(/ż/g,'z')
    // Normalize common diminutives so Ania=Anna, Kasia=Katarzyna etc.
    .replace(/^ania /,'anna ').replace(/^kasia /,'katarzyna ').replace(/^basia /,'barbara ')
    .replace(/^aga /,'agnieszka ').replace(/^jola /,'jolanta ').replace(/^iza /,'izabela ')
    .replace(/\s+/g,' ').trim();
}

function openLinkDuplicatesModal() {
  // Group participants by normalized name, only those in different groups
  const byName = {};
  db.participants.forEach(p => {
    const key = normName(p);
    if (!key) return;
    if (!byName[key]) byName[key] = [];
    byName[key].push(p);
  });

  dupCandidates = [];
  Object.values(byName).forEach(group => {
    const groups = [...new Set(group.map(p => p.group))];
    if (group.length < 2 || groups.length < 2) return; // same person in same group = not a multi-course dup
    dupCandidates.push(group);
  });

  const wrap = document.getElementById('dupListWrap');
  if (dupCandidates.length === 0) {
    wrap.innerHTML = '<div class="empty-state" style="padding:24px">Brak duplikatów — wszyscy uczestnicy są unikalni w swoich grupach.</div>';
    document.getElementById('dupSummary').textContent = '';
    document.getElementById('linkDupBtn').disabled = true;
  } else {
    document.getElementById('linkDupBtn').disabled = false;
    wrap.innerHTML = dupCandidates.map((group, idx) => {
      const alreadyLinked = group.every(p => p.linkedId && p.linkedId === group[0].linkedId);
      const label = group.map(p => `<span class="chip">${esc(p.group)}</span>`).join(' + ');
      const name = `<strong>${esc((group[0].lastName||'') + ' ' + (group[0].firstName||'')).trim()}</strong>`;
      const status = alreadyLinked
        ? '<span class="badge badge-success" style="font-size:.72rem">już powiązane</span>'
        : '';
      return `<label style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid #f0eafa;cursor:pointer">
        <input type="checkbox" data-idx="${idx}" ${alreadyLinked ? 'disabled checked' : 'checked'} style="width:16px;height:16px;flex-shrink:0">
        <span style="flex:1">${name} ${status}<br><span style="font-size:.8rem;color:var(--text-muted)">${label}</span></span>
      </label>`;
    }).join('');
    document.getElementById('dupSummary').textContent = `Znaleziono ${dupCandidates.length} duplikat${dupCandidates.length===1?'':'ów'} do powiązania.`;
  }
  openModal('linkDuplicatesModal');
}

function dupSelectAll(val) {
  document.querySelectorAll('#dupListWrap input[type=checkbox]:not(:disabled)').forEach(cb => cb.checked = val);
}

function confirmLinkDuplicates() {
  const checked = [...document.querySelectorAll('#dupListWrap input[type=checkbox]:checked:not(:disabled)')]
    .map(cb => parseInt(cb.dataset.idx));

  let linked = 0;
  checked.forEach(idx => {
    const group = dupCandidates[idx];
    // Find or create a shared linkedId for this group
    const existingLid = group.map(p => p.linkedId).find(Boolean);
    const lid = existingLid || uid();
    group.forEach(p => { p.linkedId = lid; });
    linked++;
  });

  if (linked > 0) {
    saveDb();
    renderParticipants();
  }
  closeModal('linkDuplicatesModal');
  if (linked > 0) alert(`✅ Powiązano ${linked} par duplikatów.`);
}


function deleteManualEntry(key, participantId) {
  if (!db.payments[key]) return;
  db.payments[key] = db.payments[key].filter(e => !(e.participantId === participantId && e.manual));
  if (db.payments[key].length === 0) delete db.payments[key];
  saveDb();
  renderPlatnosci();
  renderSavedMonth();
  renderStats();
}

// ===================== IMPORT GROUP =====================
let importParsed = [];

function openImportModal() {
  document.getElementById('iGroup').value = '';
  document.getElementById('iNames').value = '';
  document.getElementById('importPreviewWrap').style.display = 'none';
  document.getElementById('importPreviewList').innerHTML = '';
  document.getElementById('importSummary').textContent = '';
  document.getElementById('importConfirmBtn').disabled = true;
  importParsed = [];
  openModal('importModal');
}

function updateImportPreview() {
  const group = document.getElementById('iGroup').value.trim();
  const raw = document.getElementById('iNames').value;
  const btn = document.getElementById('importConfirmBtn');
  const wrap = document.getElementById('importPreviewWrap');

  if (!group || !raw.trim()) {
    wrap.style.display = 'none';
    btn.disabled = true;
    importParsed = [];
    return;
  }

  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  importParsed = lines.map(line => {
    const spaceIdx = line.indexOf(' ');
    let firstName, lastName;
    if (spaceIdx === -1) {
      // Jedno słowo — prawie zawsze nazwisko (łatwiej dopasować przelew)
      firstName = '';
      lastName = line;
    } else {
      firstName = line.slice(0, spaceIdx);
      lastName = line.slice(spaceIdx + 1).trim();
    }
    const isDuplicate = db.participants.some(p =>
      normalize(p.firstName) === normalize(firstName) &&
      normalize(p.lastName || '') === normalize(lastName) &&
      p.group === group
    );
    return { firstName, lastName, isDuplicate };
  });

  const toAdd = importParsed.filter(x => !x.isDuplicate);
  const dupes = importParsed.filter(x => x.isDuplicate);

  document.getElementById('importSummary').innerHTML =
    `<strong style="color:var(--success)">${toAdd.length} nowych</strong>` +
    (dupes.length ? `, <span style="color:var(--text-muted)">${dupes.length} już istnieje</span>` : '');

  document.getElementById('importPreviewList').innerHTML = importParsed.map(p => {
    const nameDisplay = p.firstName && p.lastName
      ? `${esc(p.firstName)} <strong>${esc(p.lastName)}</strong>`
      : p.lastName
        ? `<strong>${esc(p.lastName)}</strong> <span style="font-size:.75rem;color:var(--text-muted)">(tylko nazwisko — do uzupełnienia)</span>`
        : `${esc(p.firstName)} <span style="font-size:.75rem;color:var(--text-muted)">(tylko imię — do uzupełnienia)</span>`;
    return `<div style="display:flex;align-items:center;gap:6px;padding:3px 4px;${p.isDuplicate?'opacity:.45':''}">
      <span style="font-size:.8rem;color:${p.isDuplicate?'#9ca3af':'var(--success)'}">
        ${p.isDuplicate ? '✗' : '✓'}
      </span>
      <span>${nameDisplay}</span>
      ${p.isDuplicate ? '<span class="badge badge-gray" style="font-size:.7rem;margin-left:auto">pominięty</span>' : ''}
    </div>`;
  }).join('');

  wrap.style.display = '';
  btn.disabled = toAdd.length === 0;
  btn.textContent = `Importuj ${toAdd.length} uczestników`;
}

function confirmImport() {
  const group = document.getElementById('iGroup').value.trim();
  if (!group || importParsed.length === 0) return;
  const toAdd = importParsed.filter(x => !x.isDuplicate);
  if (toAdd.length === 0) return;
  toAdd.forEach(p => {
    db.participants.push({ id: uid(), firstName: p.firstName, lastName: p.lastName, group });
  });
  saveDb();
  closeModal('importModal');
  renderParticipants();
  // Filter to just imported group for easy review
  document.getElementById('groupFilter').value = group;
  renderParticipants();
}

// ===================== UTILS =====================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ===================== MANUAL REVIEW =====================
function renderManualReview() {
  const key = monthKey();
  const items = (db.pendingReview && db.pendingReview[key]) || [];
  const card = document.getElementById('manualReviewCard');
  if (items.length === 0) { card.style.display = 'none'; return; }

  card.style.display = 'block';
  const pending = items.filter(i => i.status === 'pending').length;
  const rejected = items.filter(i => i.status === 'rejected').length;
  const badge = document.getElementById('manualReviewBadge');
  badge.textContent = pending > 0 ? `${pending} do rozwiązania` : '✓ wszystkie rozwiązane';
  badge.className = 'badge ' + (pending > 0 ? 'badge-danger' : 'badge-success');
  document.getElementById('clearRejectedBtn').style.display = rejected > 0 ? '' : 'none';

  const groups = getGroups();
  const participantOptions = '<option value="">— wybierz uczestnika —</option>' +
    groups.map(g => {
      const ps = db.participants.filter(p => p.group === g)
        .sort((a,b) => (a.lastName||'').localeCompare(b.lastName||'','pl'));
      if (!ps.length) return '';
      return `<optgroup label="${esc(g)}">${
        ps.map(p => `<option value="${esc(p.id)}">${esc((p.lastName+' '+p.firstName).trim())}</option>`).join('')
      }</optgroup>`;
    }).join('');

  const typeLabel = { unmatched: 'brak dopasowania', ambiguous: 'niejednoznaczne', fuzzy: 'przybliżone (błąd kodowania?)' };
  const typeBadge = { unmatched: 'badge-danger', ambiguous: 'badge-warning', fuzzy: 'badge-info' };

  // Opcje miesiąca: 6 wstecz + bieżący + 1 do przodu (spóźnione wpłaty za poprzednie miesiące)
  function monthOptions(defaultKey) {
    const opts = [];
    for (let i = 5; i >= -1; i--) {
      let m = currentMonth - i, y = currentYear;
      while (m < 0)  { m += 12; y--; }
      while (m > 11) { m -= 12; y++; }
      const k = `${y}-${String(m + 1).padStart(2, '0')}`;
      const isFuture = i < 0;
      opts.push(`<option value="${k}"${k === defaultKey ? ' selected' : ''}>${isFuture ? '→ ' : ''}${MONTHS_PL[m]} ${y}</option>`);
    }
    return opts.join('');
  }

  document.getElementById('manualReviewList').innerHTML = items.map(item => {
    const shortLine = item.line.length > 110 ? item.line.substring(0, 110) + '…' : item.line;

    if (item.status === 'approved') {
      const p = db.participants.find(x => x.id === item.resolvedParticipantId);
      const name = p ? `${esc((p.lastName+' '+p.firstName).trim())} <span class="chip">${esc(p.group)}</span>` : '<em>uczestnik usunięty</em>';
      // Pokaż miesiąc jeśli inny niż bieżący
      const rKey = item.resolvedMonthKey || key;
      const [ry, rm] = rKey.split('-');
      const monthChip = rKey !== key
        ? ` <span class="chip" style="background:#fde68a;color:#92400e">${MONTHS_PL[parseInt(rm)-1]} ${ry}</span>`
        : '';
      return `<div class="review-approved">
        <span style="color:#16a34a;font-weight:700;flex-shrink:0">✓</span>
        <span style="flex:1;font-size:.82rem;color:#374151;word-break:break-all">${esc(shortLine)}</span>
        <span style="font-size:.82rem;white-space:nowrap">→ ${name}${monthChip}</span>
        <button onclick="undoReview('${esc(item.id)}')" class="btn btn-ghost btn-sm" style="font-size:.73rem;flex-shrink:0">↩ Cofnij</button>
      </div>`;
    }

    if (item.status === 'rejected') {
      return `<div class="review-rejected">
        <span style="color:#9ca3af;flex-shrink:0">✗</span>
        <span style="flex:1;font-size:.82rem;color:#9ca3af;text-decoration:line-through;word-break:break-all">${esc(shortLine)}</span>
        <span class="badge badge-gray" style="font-size:.73rem;flex-shrink:0">odrzucony</span>
        <button onclick="undoReview('${esc(item.id)}')" class="btn btn-ghost btn-sm" style="font-size:.73rem;flex-shrink:0">↩ Cofnij</button>
      </div>`;
    }

    // Pending
    const tLabel = typeLabel[item.type] || item.type || '';
    const tBadge = typeBadge[item.type] || 'badge-gray';
    const suggestionsHtml = (item.suggestions || []).length > 0
      ? `<div style="margin-bottom:8px;font-size:.78rem;color:#6b7280">Sugestie (kliknij aby wybrać): ${
          item.suggestions.slice(0, 5).map(s => {
            const p = db.participants.find(x => x.id === s.participantId);
            if (!p) return '';
            return `<span class="chip" style="cursor:pointer;border-color:#93c5fd"
              onclick="var el=document.getElementById('rsel-${esc(item.id)}');if(el)el.value='${esc(p.id)}'"
              title="${esc(s.reason)}">${esc((p.lastName+' '+p.firstName).trim())} <small style="opacity:.65">${esc(p.group)}</small></span>`;
          }).filter(Boolean).join(' ')
        }</div>`
      : '';

    return `<div class="review-pending">
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span class="badge ${tBadge}" style="font-size:.72rem;flex-shrink:0">${esc(tLabel)}</span>
        <span style="font-size:.82rem;color:#374151;word-break:break-all;flex:1">${esc(item.line)}</span>
      </div>
      ${suggestionsHtml}
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="rsel-${esc(item.id)}" style="flex:2;min-width:200px;font-size:.85rem">${participantOptions}</select>
        <select id="rmsel-${esc(item.id)}" style="min-width:140px;font-size:.85rem" title="Miesiąc wpłaty">${monthOptions(key)}</select>
        <button onclick="approveReview('${esc(item.id)}')" class="btn btn-success btn-sm" style="flex-shrink:0">✓ Zatwierdź</button>
        <button onclick="rejectReview('${esc(item.id)}')" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;flex-shrink:0">✗ Odrzuć</button>
      </div>
    </div>`;
  }).join('');
}

function approveReview(id) {
  const key = monthKey();
  if (!db.pendingReview || !db.pendingReview[key]) return;
  const item = db.pendingReview[key].find(i => i.id === id);
  if (!item || item.status !== 'pending') return;

  const sel  = document.getElementById('rsel-'  + id);
  const msel = document.getElementById('rmsel-' + id);
  const participantId = sel  ? sel.value  : '';
  const targetKey     = msel ? msel.value : key;

  if (!participantId) { alert('Wybierz uczestnika przed zatwierdzeniem.'); return; }

  item.status = 'approved';
  item.resolvedParticipantId = participantId;
  item.resolvedMonthKey = targetKey;
  item.savedAt = new Date().toISOString();

  if (!db.payments[targetKey]) db.payments[targetKey] = [];
  if (!db.payments[targetKey].some(e => e.participantId === participantId)) {
    db.payments[targetKey].push({ participantId, title: item.line, savedAt: new Date().toISOString(), source: 'manual_review' });
  }

  saveDb();
  renderManualReview();
  renderSavedMonth();
  renderStats();
}

function rejectReview(id) {
  const key = monthKey();
  if (!db.pendingReview || !db.pendingReview[key]) return;
  const item = db.pendingReview[key].find(i => i.id === id);
  if (!item) return;
  item.status = 'rejected';
  saveDb();
  renderManualReview();
}

function clearRejected() {
  const key = monthKey();
  if (!db.pendingReview || !db.pendingReview[key]) return;
  db.pendingReview[key] = db.pendingReview[key].filter(i => i.status !== 'rejected');
  if (db.pendingReview[key].length === 0) delete db.pendingReview[key];
  saveDb();
  renderManualReview();
}

function undoReview(id) {
  const key = monthKey();
  if (!db.pendingReview || !db.pendingReview[key]) return;
  const item = db.pendingReview[key].find(i => i.id === id);
  if (!item) return;
  if (item.status === 'approved' && item.resolvedParticipantId) {
    const targetKey = item.resolvedMonthKey || key;
    if (db.payments[targetKey]) {
      db.payments[targetKey] = db.payments[targetKey].filter(e =>
        !(e.participantId === item.resolvedParticipantId && e.source === 'manual_review' && e.title === item.line)
      );
      if (db.payments[targetKey].length === 0) delete db.payments[targetKey];
    }
  }
  item.status = 'pending';
  item.resolvedParticipantId = null;
  item.savedAt = null;
  saveDb();
  renderManualReview();
  renderSavedMonth();
  renderStats();
}

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});
</script>

</template>
