<style>
  #taktToggle{position:fixed;right:14px;bottom:14px;z-index:99999;background:#D62B1F;color:#fff;
    border:none;border-radius:22px;padding:10px 16px;font:600 .85rem system-ui,sans-serif;cursor:pointer;
    box-shadow:0 6px 18px -6px rgba(0,0,0,.5);opacity:.92;}
  #taktToggle:hover{opacity:1;}
</style>
<script>
// ═══════════ KONFIGURACJA SZKOŁY (TAKT) — jeden blok dla całego panelu ═══════════
const TAKT_CONFIG = {
  schoolName:         'Nazwa Szkoły Tańca',
  schoolId:           'szkola',                          // krótki id: 'senso','team'… — namespace localStorage + nazwa backupu
  supabaseUrl:        'https://TWOJ-PROJEKT.supabase.co',
  supabaseAnonKey:    'WKLEJ_ANON_KEY',
  logo:               '',                                // 'data:image/png;base64,...' lub URL; '' = bez logo
  couplesUrl:         'https://TWOJA-SZKOLA.github.io/zapisy/',
  defaultLessonPrice: 120,
  syncMode:           'local',                           // 'local' (Model A) | 'encrypted-cloud' (Model B)
  bankProfile:        'auto',                            // 'auto' | 'ing' | 'generic' | 'mt940'
};
// ═════════════════════════════════════════════════════════════
// localStorage per szkoła — pewność „czyj backup jest czyj"
const LS_PREFIX = 'takt_' + (TAKT_CONFIG.schoolId || 'default') + '_';
function LSget(k){ return localStorage.getItem(LS_PREFIX + k); }
function LSset(k, v){ return localStorage.setItem(LS_PREFIX + k, v); }
function LSdel(k){ return localStorage.removeItem(LS_PREFIX + k); }
// Wykrywanie trybu: mobile (telefon/tablet) vs desktop; ręczny wybór ma priorytet.
function taktMode(){
  const o = localStorage.getItem(LS_PREFIX + 'mode');
  if (o === 'desktop' || o === 'mobile') return o;
  const coarse = matchMedia('(pointer:coarse)').matches;
  const touch  = (navigator.maxTouchPoints || 0) > 0;
  const minDim = Math.min(screen.width || 9999, screen.height || 9999);
  return (coarse && touch && minDim < 820) ? 'mobile' : 'desktop';
}
function taktToggle(){
  const cur = taktMode();
  localStorage.setItem(LS_PREFIX + 'mode', cur === 'mobile' ? 'desktop' : 'mobile');
  location.reload();
}
function taktBoot(){
  const mode = taktMode();
  const tpl  = document.getElementById(mode === 'mobile' ? 'app-mobile' : 'app-desktop');
  const host = document.getElementById('appHost');
  host.appendChild(tpl.content.cloneNode(true));
  // klonowane <script> nie wykonują się — odtwórz je, by uruchomić kod wybranego widoku
  host.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    if (old.src) s.src = old.src; else s.textContent = old.textContent;
    old.replaceWith(s);
  });
  const lbl = document.getElementById('taktToggleLbl');
  if (lbl) lbl.textContent = mode === 'mobile' ? '🖥 Pełny widok' : '📱 Widok mobilny';
}
document.addEventListener('DOMContentLoaded', taktBoot);
</script>
</head>

<button id="taktToggle" onclick="taktToggle()" title="Przełącz między widokiem mobilnym a pełnym"><span id="taktToggleLbl">przełącz widok</span></button>

      <div class="form-group" style="flex:1;min-width:140px;margin:0">

      <button class="btn btn-outline" onclick="closeModal('nickModal')">Zamknij</button>

</div>

  <div class="modal">
    <h3>Usuń uczestnika</h3>
    <p style="margin-bottom:16px;color:var(--text-muted)">Czy na pewno chcesz usunąć tego uczestnika? Historia wpłat zostanie zachowana.</p>

</div>

<script>
// ===================== DATA =====================
let db = { participants: [], payments: {}, confirmedNoPayment: {} };
let editingId = null;
let deletingId = null;
let currentYear, currentMonth;
let pendingAnalysis = null;   // result of last analyzeTransfers()
let lastSaveSession = null;   // cross-month summary shown after save, cleared on next analyzeTransfers()
let backupDirHandle = null;   // File System Access API — handle do folderu z backup_auto.json
let isFileConnected = false;  // czy auto-zapis do pliku jest aktywny

const MONTHS_PL = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

// Słownik zdrobnień — klucze i wartości MUSZĄ być już znormalizowane (lowercase, bez polskich znaków)
// Zarówno dim→formal jak i formal→dim są sprawdzane w nameInLine()
const NICK_MAP = {
  // Żeńskie
  'hania': 'hanna', 'hanka': 'hanna',
  'ania':  'anna',  'anka':  'anna',
  'kasia': 'katarzyna', 'kaska': 'katarzyna',
  'basia': 'barbara',   'baska': 'barbara',
  'zosia': 'zofia',     'zoska': 'zofia',     'zoja': 'zofia',
  'marysia': 'maria',   'marys': 'maria',     'maryja': 'maria',
  'ola':   'aleksandra','alka':  'aleksandra','olunia': 'aleksandra',
  'magda': 'magdalena', 'madzia': 'magdalena',
  'gosia': 'malgorzata','malgosia': 'malgorzata',
  'jola':  'jolanta',   'jolka': 'jolanta',
  'danka': 'danuta',
  'jadzia': 'jadwiga',
  'natka': 'natalia',   'natalka': 'natalia',
  'wika':  'wiktoria',
  'tosia': 'antonina',
  'nela':  'kornelia',  'nelka': 'kornelia',
  'stasia': 'stanislawa',
  'iza':   'izabela',   'izka':  'izabela',
  'aga':   'agnieszka',
  'jasia': 'janina',
  'krysia': 'krystyna',
  'martusia': 'marta',
  'ewka':  'ewa',       'ewcia': 'ewa',
  'nika':  'nikola',
  'weronika': 'weronika', 'werka': 'weronika',
  // Męskie
  'maciek': 'maciej',   'macius': 'maciej',
  'janek':  'jan',      'jas':    'jan',
  'tomek':  'tomasz',
  'piotrek': 'piotr',   'piotrus': 'piotr',
  'bartek': 'bartlomiej',
  'szymek': 'szymon',
  'krzys':  'krzysztof',
  'pawelku': 'pawel',   'pawelk': 'pawel',
  'filipek': 'filip',
  'milek': 'milosz',
};

// Efektywny słownik = wbudowany NICK_MAP + własne wpisy szkoły (db.nicknames).
// Szkoła może dopisywać nietypowe zdrobnienia w UI („📖 Słownik zdrobnień").
let EFF_NICKS = NICK_MAP;
function rebuildNicks() { EFF_NICKS = Object.assign({}, NICK_MAP, (typeof db !== 'undefined' && db && db.nicknames) || {}); }

function loadDb() {
  const s = LSget('taniec_db_v2');
  if (s) db = JSON.parse(s);
  if (!db.pendingReview) db.pendingReview = {};
  if (!db.confirmedNoPayment) db.confirmedNoPayment = {};
  if (!db.trainers) db.trainers = ['Trener 1', 'Trener 2', 'Trener 3'];
  if (!db.lessons) db.lessons = [];
  if (!db.nicknames) db.nicknames = {};  // własne zdrobnienia szkoły (dim→forma oficjalna, znormalizowane)
  rebuildNicks();
  if (!db.coaches) db.coaches = [];      // szkoleniowcy gościnni {id,name,price}
  if (!db.trainings) db.trainings = [];  // szkolenia weekendowe {id,name,dateSat,dateSun,coachIds[],days[]}
  db.trainings.forEach(t => { if (!t.days || !t.days.length) t.days = ['sobota', 'niedziela']; });
  if (!db.cloud) db.cloud = { url: '', anonKey: '', trainerPin: '' };
  // Migracja: sloty bez daty (z części 1) → przypisz do bieżącego tygodnia
  db.lessons.forEach(l => { if (!l.date && l.day) l.date = fmtDate(weekdayDate(0, l.day)); });
  // Migracja: typ lekcji + cena (stałe lekcje Czw/Pt = 120 zł)
  db.lessons.forEach(l => { if (!l.kind) l.kind = 'weekly'; if (l.price == null) l.price = 120; });
}
function saveDb() {
  LSset('taniec_db_v2', JSON.stringify(db));
  if (isFileConnected) writeBackupFile();  // async, non-blocking
  scheduleStatePush();  // sync między urządzeniami (debounce, async)
}

// ===================== INIT =====================
loadDb();
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth(); // 0-based
updateMonthLabel();
renderParticipants();
renderStats();
renderSavedMonth();
renderManualReview();
renderPlatnosci();
function applyBranding(){
  try{
    var n=(TAKT_CONFIG.schoolName||'').trim();
    if(n){ document.title='TAKT — '+n;
           var s=document.getElementById('brandSub'); if(s) s.textContent=n; }
    var lg=document.getElementById('brandLogo');
    if(lg && (TAKT_CONFIG.logo||'').trim()){ lg.src=TAKT_CONFIG.logo; lg.style.display=''; }
    var cl=document.getElementById('couplesLink');
    if(cl && (TAKT_CONFIG.couplesUrl||'').trim()){ cl.href=TAKT_CONFIG.couplesUrl; cl.textContent=TAKT_CONFIG.couplesUrl.replace(/^https?:\/\//,'').replace(/\/$/,''); }
    if(TAKT_CONFIG.syncMode!=='encrypted-cloud'){ var ss=document.getElementById('syncSection'); if(ss) ss.style.display='none'; }
  }catch(e){}
}
applyBranding();
initAutoBackup().then(() => autoLoadStateOnStart());  // najpierw plik backupu, potem stan z chmury

// ===================== TABS =====================
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'statystyki') renderStats();
  if (name === 'wplaty') { renderSavedMonth(); renderManualReview(); clearAnalysis(); }
  if (name === 'platnosci') renderPlatnosci();
  if (name === 'grafik') { renderGrafik(); checkCloud(); if (db.cloud && db.cloud.autoRefresh) startAutoRefresh(false); else autoRefreshLabel(); }
  if (name === 'szkolenia') { renderSzkolenia(); checkCloud(); }
}

// ===================== GRAFIK — LEKCJE INDYWIDUALNE (Czw/Pt) =====================
function addMinutes(hhmm, mins) {
  const [h, m] = hhmm.split(':').map(Number);
  const total = h * 60 + m + mins;
  const nh = Math.floor(total / 60) % 24, nm = total % 60;
  return String(nh).padStart(2, '0') + ':' + String(nm).padStart(2, '0');
}

// --- daty / tygodnie ---
let grafikWeek = 0; // 0 = bieżący tydzień, -1 poprzedni, +1 następny
function mondayOf(offsetWeeks) {
  const d = new Date(); d.setHours(0, 0, 0, 0);
  const dow = (d.getDay() + 6) % 7; // pon=0 … nd=6
  d.setDate(d.getDate() - dow + offsetWeeks * 7);
  return d;
}
// Dni tygodnia: slugi ASCII (jak 'piatek') + etykiety PL do wyświetlania.
const DAY_OFFSET = { poniedzialek: 0, wtorek: 1, sroda: 2, czwartek: 3, piatek: 4, sobota: 5, niedziela: 6 };
const DAY_LABEL = { poniedzialek: 'Poniedziałek', wtorek: 'Wtorek', sroda: 'Środa', czwartek: 'Czwartek', piatek: 'Piątek', sobota: 'Sobota', niedziela: 'Niedziela' };
const WEEK_DAYS = ['poniedzialek', 'wtorek', 'sroda', 'czwartek', 'piatek', 'sobota', 'niedziela'];
function weekdayDate(offsetWeeks, weekday) {
  const d = mondayOf(offsetWeeks);
  d.setDate(d.getDate() + (DAY_OFFSET[weekday] ?? 3));
  return d;
}
// Daty (YYYY-MM-DD) wszystkich dni tygodnia grafiku
function grafikWeekDates() { return WEEK_DAYS.map(day => fmtDate(weekdayDate(grafikWeek, day))); }
function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function fmtDM(d) { return String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0'); }

function changeGrafikWeek(delta) { grafikWeek += delta; renderGrafik(); }

// Sugestie par seniorskich (uczestnicy połączeni pairId) do datalist
function getPairSuggestions() {
  const seen = new Set(), out = [];
  db.participants.forEach(p => {
    if (!p.pairId || seen.has(p.pairId)) return;
    const partner = db.participants.find(x => x.pairId === p.pairId && x.id !== p.id);
    if (partner) {
      seen.add(p.pairId);
      out.push(`${p.firstName} ${p.lastName} & ${partner.firstName} ${partner.lastName}`.replace(/\s+/g, ' ').trim());
    }
  });
  return out;
}

// Podpowiedzi solistów/solistek — osoby z grup Sport / Junior Sport (bez „Hobby Sport" = pary).
function getSoloSuggestions() {
  return [...new Set(db.participants
    .filter(p => /sport/i.test(p.group || '') && !/hobby/i.test(p.group || ''))
    .map(p => `${p.firstName || ''} ${p.lastName || ''}`.replace(/\s+/g, ' ').trim())
    .filter(Boolean))]
    .sort((a, b) => a.localeCompare(b, 'pl'));
}

// Wypełnij datalist zależnie od wyboru (para = pary taneczne, solista = osoby z grup sport).
function refreshBookSuggestions() {
  const solo = +document.getElementById('bPeople').value === 1;
  const list = solo ? getSoloSuggestions() : getPairSuggestions();
  document.getElementById('pairSuggestions').innerHTML = list.map(s => `<option value="${esc(s)}">`).join('');
  const inp = document.getElementById('bPair');
  if (inp) inp.placeholder = solo ? 'np. Anna Nowak' : 'np. Jan Kowalski & Anna Nowak';
}

function renderGrafik() {
  const monday = mondayOf(grafikWeek), sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const label = document.getElementById('grafikWeekLabel');
  if (label) label.textContent = (grafikWeek === 0 ? 'Ten tydzień · ' : '') + fmtDM(monday) + ' – ' + fmtDM(sunday);
  const grid = document.getElementById('grafGrid');
  if (!grid) return;
  // Czw/Pt zawsze; inny dzień tylko, gdy ma lekcje indywidualne (kolumna znika z ostatnią lekcją)
  const show = WEEK_DAYS.filter(day => {
    if (day === 'czwartek' || day === 'piatek') return true;
    const dateStr = fmtDate(weekdayDate(grafikWeek, day));
    return db.lessons.some(l => (l.kind || 'weekly') === 'weekly' && l.date === dateStr);
  });
  grid.innerHTML = show.map(day => {
    const dateStr = fmtDate(weekdayDate(grafikWeek, day));
    const extra = day !== 'czwartek' && day !== 'piatek';
    // filtr po dacie + kind (nie po l.day) — sobota nie może wciągnąć lekcji szkoleniowych
    const lessons = db.lessons.filter(l => (l.kind || 'weekly') === 'weekly' && l.date === dateStr);
    let body;
    if (!lessons.length) {
      body = '<div class="graf-empty">Brak lekcji — dodaj poniżej</div>';
    } else {
      // grupuj po trenerze (kolejność wg listy trenerów), w grupie po godzinie
      const byTrainer = {};
      lessons.forEach(l => { (byTrainer[l.trainer] = byTrainer[l.trainer] || []).push(l); });
      const order = db.trainers.filter(t => byTrainer[t])
        .concat(Object.keys(byTrainer).filter(t => !db.trainers.includes(t)));
      body = '<div class="graf-tcols">' + order.map(tr => {
        const list = byTrainer[tr].sort((a, b) => a.start.localeCompare(b.start));
        return `<div class="graf-tcol"><div class="graf-tcol-head">${esc(tr)}</div><div class="graf-tcol-body">`
          + list.map(lessonSlotHtml).join('') + `</div></div>`;
      }).join('') + '</div>';
    }
    return `<div class="graf-day graf-day-int${extra ? ' extra' : ''}">
      <div class="graf-day-head">${DAY_LABEL[day]} ${fmtDM(weekdayDate(grafikWeek, day))}${extra ? '<span class="graf-extra-tag">dodatkowy</span>' : ''}</div>
      <div class="graf-day-body">${body}</div>
      <button class="graf-add" onclick="openLessonModal('${day}')">+ Lekcja</button>
    </div>`;
  }).join('');
  renderPaySummary();
}

function renderPaySummary() {
  const el = document.getElementById('grafPaySummary');
  if (!el) return;
  const days = grafikWeekDates();
  const booked = db.lessons.filter(l => l.kind !== 'weekend' && days.includes(l.date) && l.pair && l.pair.trim());
  const price = l => (l.price != null) ? l.price : TAKT_CONFIG.defaultLessonPrice;
  const total = booked.reduce((s, l) => s + price(l), 0);
  const paid = booked.filter(l => l.paid).reduce((s, l) => s + price(l), 0);
  const due = total - paid;
  if (!booked.length) { el.innerHTML = ''; return; }
  el.innerHTML =
    `<div class="ps">Zapisanych lekcji w tym tygodniu <b>${booked.length}</b></div>` +
    `<div class="ps">Wartość łącznie <b>${total} zł</b></div>` +
    `<div class="ps paid">Opłacone <b>${paid} zł</b></div>` +
    `<div class="ps due">Do zapłaty <b>${due} zł</b></div>`;
}

function lessonSlotHtml(l) {
  const end = addMinutes(l.start, 45);
  const styleClass = l.style === 'ST' ? 'st' : 'la';
  const booked = l.pair && l.pair.trim();
  const ppl = (l.people === 1) ? 1 : 2;
  const price = (l.price != null) ? l.price : TAKT_CONFIG.defaultLessonPrice;
  const icon = ppl === 1 ? '🧍' : '👯';
  const payHtml = l.paid
    ? `<button class="pay-pill paid" title="Kliknij, by cofnąć" onclick="togglePaid('${l.id}')">✓ Opłacone ${price} zł</button>`
    : `<button class="pay-pill" title="Kliknij, gdy zapłacono" onclick="togglePaid('${l.id}')">Do zapłaty ${price} zł</button>`;
  const bookHtml = booked
    ? `<div class="graf-paired">
         <div class="gp-row">${icon} ${esc(l.pair)} <button title="Wypisz" onclick="unbookLesson('${l.id}')">✕</button></div>
         ${payHtml}
       </div>`
    : `<button class="graf-bookbtn" onclick="openBookModal('${l.id}')">✍ Zapisz parę / solistkę / solistę</button>`;
  return `<div class="graf-slot lesson ${styleClass}">
    <button class="graf-del" title="Usuń lekcję" onclick="deleteLesson('${l.id}')">🗑</button>
    <span class="graf-time">${l.start} – ${end}</span><span class="graf-style ${styleClass}">${l.style}</span>
    ${bookHtml}
  </div>`;
}

// day = slug dnia (przycisk „+ Lekcja" w kolumnie) lub brak (przycisk „＋ Inny dzień" — wybór w modalu)
function openLessonModal(day) {
  const pickRow = document.getElementById('lDayRow');
  const pick = document.getElementById('lDayPick');
  if (day) {
    pickRow.style.display = 'none';
    document.getElementById('lessonModalTitle').textContent =
      'Dodaj lekcję — ' + DAY_LABEL[day].toLowerCase() + ' ' + fmtDM(weekdayDate(grafikWeek, day));
  } else {
    const others = WEEK_DAYS.filter(d => d !== 'czwartek' && d !== 'piatek');
    pick.innerHTML = others.map(d =>
      `<option value="${d}">${DAY_LABEL[d]} ${fmtDM(weekdayDate(grafikWeek, d))}</option>`).join('');
    pickRow.style.display = '';
    document.getElementById('lessonModalTitle').textContent = 'Dodaj lekcję — inny dzień';
  }
  document.getElementById('lDay').value = day || '';
  document.getElementById('lStyle').value = 'LA';
  document.getElementById('lStart').value = '16:00';
  const sel = document.getElementById('lTrainer');
  sel.innerHTML = db.trainers.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  openModal('lessonModal');
}

function saveLesson() {
  const day = document.getElementById('lDay').value || document.getElementById('lDayPick').value;
  const trainer = document.getElementById('lTrainer').value;
  const style = document.getElementById('lStyle').value;
  const start = document.getElementById('lStart').value;
  if (!trainer || !style || !start) { alert('Uzupełnij trenera, styl i godzinę.'); return; }
  const date = fmtDate(weekdayDate(grafikWeek, day));
  // kolizja: ten sam trener, ten sam dzień, nakładające się 45 min
  const toMin = t => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };
  const ns = toMin(start), ne = ns + 45;
  const clash = db.lessons.find(l => l.trainer === trainer && l.date === date && (() => { const es = toMin(l.start), ee = es + 45; return ns < ee && es < ne; })());
  if (clash) { alert(`${trainer} ma już lekcję ${clash.start} – ${addMinutes(clash.start, 45)} tego dnia. Wybierz godzinę, która się nie nakłada.`); return; }
  db.lessons.push({ id: uid(), day, date, trainer, style, start, pair: '', people: 2, paid: false, bookedBy: '', bookedAt: null, kind: 'weekly', price: lessonPriceNow() });
  saveDb();
  closeModal('lessonModal');
  renderGrafik();
}

// Odśwież właściwy widok zależnie od typu lekcji (weekendowa = zakładka Szkolenia).
function rerenderLesson(kind) { if (kind === 'weekend') renderSzkolenia(); else renderGrafik(); }

async function deleteLesson(id) {
  const l = db.lessons.find(x => x.id === id);
  if (!l) return;
  if (l.pair && !confirm('Na tę lekcję zapisana jest para. Usunąć mimo to?')) return;
  const kind = l.kind;
  db.lessons = db.lessons.filter(x => x.id !== id);
  saveDb();
  rerenderLesson(kind);
  // Usuń termin też z chmury — sama publikacja nie zawsze obejmie ten tydzień,
  // a „Pobierz zapisy" niczego nie usuwa.
  const sb = getSb();
  if (!sb || !db.cloud || !db.cloud.trainerPin) {
    alert('Lekcję usunięto lokalnie, ale BEZ połączenia z chmurą (lub bez PIN-u) — dla par może być nadal widoczna.\nGdy będziesz online, kliknij „☁ Publikuj" przy tym tygodniu.');
    return;
  }
  const { error } = await sb.rpc('trainer_delete_slot', { p_pin: db.cloud.trainerPin, p_id: id });
  if (error) alert('Lekcję usunięto lokalnie, ale nie udało się usunąć jej z chmury: ' + (error.message || error) + '\nKliknij „☁ Publikuj" przy tym tygodniu.');
}

function updateBookPrice() {
  const n = +document.getElementById('bPeople').value;
  document.getElementById('bPairLabel').textContent = n === 1 ? 'Imię i nazwisko solistki / solisty *' : 'Nazwa pary *';
  refreshBookSuggestions();
}

function openBookModal(id) {
  const l = db.lessons.find(x => x.id === id);
  if (!l) return;
  document.getElementById('bLessonId').value = id;
  document.getElementById('bPair').value = '';
  document.getElementById('bPeople').value = '2';
  updateBookPrice();   // ustawia etykietę + podpowiedzi (pary/soliści) wg wyboru
  const dayName = DAY_LABEL[l.day] || l.day;
  const price = (l.price != null) ? l.price : TAKT_CONFIG.defaultLessonPrice;
  document.getElementById('bLessonInfo').innerHTML =
    `<strong>${dayName}</strong>, ${l.start} – ${addMinutes(l.start, 45)} · ${l.style === 'LA' ? 'Latin (LA)' : 'Standard (ST)'} · ${esc(l.trainer)} · <strong>${price} zł</strong>`;
  openModal('bookModal');
}

async function confirmBook() {
  const id = document.getElementById('bLessonId').value;
  const pair = document.getElementById('bPair').value.trim();
  const people = +document.getElementById('bPeople').value === 1 ? 1 : 2;
  if (!pair) { alert('Wpisz nazwę pary lub imię solisty.'); return; }
  const l = db.lessons.find(x => x.id === id);
  if (!l) return;
  l.pair = pair;
  l.people = people;
  l.paid = false;
  saveDb();
  closeModal('bookModal');
  rerenderLesson(l.kind);
  // Oznacz termin jako zajęty też w chmurze, żeby inna para nie zapisała się na niego online.
  const sb = getSb();
  if (sb && db.cloud && db.cloud.trainerPin) {
    const { error } = await sb.rpc('trainer_set_pair', { p_pin: db.cloud.trainerPin, p_id: id, p_pair: pair, p_people: people });
    if (error) alert('Zapisano lokalnie, ale nie udało się oznaczyć terminu jako zajęty w chmurze: ' + (error.message || error));
  }
}

function togglePaid(id) {
  const l = db.lessons.find(x => x.id === id);
  if (!l) return;
  l.paid = !l.paid;
  saveDb();
  rerenderLesson(l.kind);
}

async function unbookLesson(id) {
  const l = db.lessons.find(x => x.id === id);
  if (!l) return;
  if (!confirm('Wypisać „' + l.pair + '" z tej lekcji?')) return;
  l.pair = '';
  l.bookedBy = '';
  l.bookedAt = null;
  l.paid = false;
  saveDb();
  rerenderLesson(l.kind);
  // Zwolnij termin też w chmurze — publikacja celowo nie nadpisuje rezerwacji,
  // więc bez tego para dalej widniałaby jako „Zajęte" na stronie zapisów.
  const sb = getSb();
  if (!sb || !db.cloud || !db.cloud.trainerPin) {

async function publishWeek() {
  const sb = getSb();
  if (!sb) { alert('Brak połączenia z internetem.'); updateCloudStatusUI('offline'); return; }
  if (!db.cloud || !db.cloud.trainerPin) { alert('Najpierw podaj PIN trenera (kliknij status chmury).'); openCloudModal(); return; }
  const monday = mondayOf(grafikWeek);
  // WSZYSTKIE lekcje indywidualne tygodnia (też nietypowe dni) — publish_slots kasuje
  // z chmury cały tydzień kind='weekly' spoza listy, więc lista musi być kompletna.
  const days = grafikWeekDates();
  const slots = db.lessons.filter(l => (l.kind || 'weekly') === 'weekly' && days.includes(l.date)).map(l => ({
    id: l.id, date: l.date, weekday: l.day, trainer: l.trainer, style: l.style, start_time: l.start,
    price: (l.price != null) ? l.price : lessonPriceNow()
  }));
  if (!slots.length && !confirm('Brak lekcji w tym tygodniu — opublikować pusty grafik (usunie zdalne sloty tego tygodnia)?')) return;
  const { error } = await sb.rpc('publish_slots', { p_pin: db.cloud.trainerPin, p_week_start: fmtDate(monday), p_slots: slots });
  if (error) { updateCloudStatusUI('offline'); alert('Błąd publikacji: ' + (error.message || error)); return; }
  updateCloudStatusUI('online');
  alert('Opublikowano ' + slots.length + ' lekcji do chmury.');
}

// Ciche pobranie zapisów bieżącego tygodnia (bez alertów — używane też przez
// auto-odświeżanie). Importuje też lekcje Czw/Pt dodane z panelu mobilnego.
// Zwraca {changed, cloudIds, days}; rzuca wyjątek przy błędzie.
async function pullBookingsCore() {
  const sb = getSb();
  if (!sb) { updateCloudStatusUI('offline'); throw new Error('Brak połączenia z internetem.'); }
  if (!db.cloud || !db.cloud.trainerPin) throw new Error('Brak PIN-u trenera — kliknij status chmury i podaj PIN.');
  const days = grafikWeekDates();  // cały tydzień — także nietypowe dni lekcji indywidualnych
  // trainer_slots (PIN) zwraca terminy z PRAWDZIWYMI nazwami par — bezpośredni
  // odczyt tabeli pokazuje tylko znacznik zajętości (prywatność nazw).
  const { data, error } = await sb.rpc('trainer_slots', { p_pin: db.cloud.trainerPin, p_from: days[0], p_to: days[6] });
  if (error) { updateCloudStatusUI('offline'); throw new Error(error.message || String(error)); }
  updateCloudStatusUI('online');
  let changed = 0;
  const cloudIds = new Set();
  (data || []).forEach(r => {
    cloudIds.add(r.id);
    const l = db.lessons.find(x => x.id === r.id);
    if (!l) {
      if ((r.kind || 'weekly') !== 'weekly') return;  // szkolenia tylko z desktopu
      db.lessons.push({ id: r.id, day: r.weekday, date: r.date, trainer: r.trainer, style: r.style,
        start: r.start_time, pair: r.pair || '', people: (r.people === 1) ? 1 : 2, paid: false,
        bookedBy: r.booked_by || '', bookedAt: r.booked_at || null, kind: 'weekly',
        price: (r.price != null) ? r.price : 120 });
      changed++;
      return;
    }
    const newPair = r.pair || '';
    const newPeople = (r.people === 1) ? 1 : 2;
    if ((l.pair || '') !== newPair || (l.people || 2) !== newPeople) {
      l.pair = newPair;
      l.bookedBy = r.booked_by || '';
      l.bookedAt = r.booked_at || null;
      l.people = newPeople;
      if (!newPair) l.paid = false;  // wypisano w chmurze → reset opłaty
      changed++;
    }
  });
  if (changed) { saveDb(); renderGrafik(); }
  return { changed, cloudIds, days };
}

async function pullBookings() {
  let res;
  try { res = await pullBookingsCore(); }
  catch (e) { alert('Błąd pobierania: ' + e.message); return; }
  // Lekcje Czw/Pt, które są lokalnie, ale zniknęły z chmury (np. usunięte z telefonu).
  const missing = db.lessons.filter(l => (l.kind || 'weekly') === 'weekly'
    && res.days.includes(l.date) && !res.cloudIds.has(l.id));
  if (missing.length && confirm(missing.length + ' lekcji z tego tygodnia jest lokalnie, ale nie ma ich w chmurze (usunięte z innego urządzenia albo jeszcze nieopublikowane).\n\nOK = usuń je też lokalnie\nAnuluj = zostaw (kliknij „☁ Publikuj tydzień", jeśli mają wrócić do chmury)')) {
    const ids = new Set(missing.map(l => l.id));
    db.lessons = db.lessons.filter(l => !ids.has(l.id));
    saveDb();
    renderGrafik();
  }
  alert(res.changed ? ('Zaktualizowano zapisy: ' + res.changed) : 'Brak nowych zapisów w tym tygodniu.');
}

// ---- AUTO-ODŚWIEŻANIE ZAPISÓW (co 30 s, bez alertów) ----
const AUTO_REFRESH_SEC = 30;
let autoRefreshTimer = null, autoRefreshLeft = AUTO_REFRESH_SEC, autoRefreshBusy = false;

function autoRefreshLabel() {
  const btn = document.getElementById('autoRefreshBtn');
  if (!btn) return;
  btn.textContent = autoRefreshTimer ? ('🔄 Auto (' + autoRefreshLeft + ' s)') : '🔄 Auto: wył.';
  btn.classList.toggle('auto-on', !!autoRefreshTimer);
}

function toggleAutoRefresh() {
  if (autoRefreshTimer) stopAutoRefresh();
  else startAutoRefresh(true);
}

function startAutoRefresh(pullNow) {
  if (autoRefreshTimer) return;
  autoRefreshLeft = AUTO_REFRESH_SEC;
  autoRefreshTimer = setInterval(autoRefreshTick, 1000);
  if (!db.cloud) db.cloud = {};
  db.cloud.autoRefresh = true;   // zapamiętaj wybór — wznowi się po otwarciu Grafiku
  saveDb();
  autoRefreshLabel();

function stopAutoRefresh() {
  clearInterval(autoRefreshTimer);
  autoRefreshTimer = null;
  if (db.cloud) { db.cloud.autoRefresh = false; saveDb(); }
  autoRefreshLabel();
}

function autoRefreshTick() {
  autoRefreshLeft--;
  if (autoRefreshLeft <= 0) { autoRefreshLeft = AUTO_REFRESH_SEC; autoRefreshPull(); }
  autoRefreshLabel();
}

async function autoRefreshPull() {
  if (autoRefreshBusy) return;   // poprzednie pobranie jeszcze trwa
  autoRefreshBusy = true;

// ---- SYNCHRONIZACJA CAŁEGO STANU MIĘDZY URZĄDZENIAMI (chmura) ----
// Cała baza (uczestnicy, wpłaty, grafik, szkolenia) jest wysyłana do tabeli
// app_state po każdej zmianie (debounce) i wczytywana przy starcie aplikacji.
// Znacznik wersji (ms) trzymany POZA db, żeby nie podróżował ze snapshotem.
const SYNC_BASE_KEY = 'taniec_sync_base';    // wersja chmury, na której bazujemy
const SYNC_DIRTY_KEY = 'taniec_sync_dirty';  // '1' = lokalne zmiany niewysłane
const SYNC_DEV_KEY = 'taniec_device';

function deviceName() {
  let d = LSget(SYNC_DEV_KEY);
  if (!d) { d = 'Komputer-' + Math.random().toString(36).slice(2, 6).toUpperCase(); LSset(SYNC_DEV_KEY, d); }
  return d;
}

let statePushTimer = null, statePushing = false, statePulling = false, applyingCloudState = false;

function isDbEmptyish() {
  return (!db.participants || !db.participants.length)
      && (!db.lessons || !db.lessons.length)
      && (!db.trainings || !db.trainings.length);
}

// ---- MODEL B: szyfrowanie blobu przy synchronizacji (WebCrypto AES-GCM + PBKDF2) ----
// Hasło szyfrujące trzymane lokalnie per urządzenie (chroni kopię W CHMURZE, nie lokalną —
// lokalnie i tak jest jawny db). Chmura (Supabase) widzi tylko {enc,salt,iv,ct}.
const ENC_PASS_KEY = 'taniec_enc_pass';
function getEncPass() { return LSget(ENC_PASS_KEY) || ''; }
function _b64(buf) { const b = new Uint8Array(buf); let s = ''; for (let i = 0; i < b.length; i += 0x8000) s += String.fromCharCode.apply(null, b.subarray(i, i + 0x8000)); return btoa(s); }
function _unb64(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function _deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 150000, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}
async function encryptDb(obj, pass) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await _deriveKey(pass, salt);
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { enc: true, v: 1, salt: _b64(salt), iv: _b64(iv), ct: _b64(ct) };
}
async function decryptDb(blob, pass) {
  const key = await _deriveKey(pass, _unb64(blob.salt));
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: _unb64(blob.iv) }, key, _unb64(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
function refreshEncPassUI() {
  const st = document.getElementById('encPassStatus');
  if (st) st.textContent = getEncPass() ? '✓ Hasło ustawione na tym urządzeniu.' : '⚠ Brak hasła — synchronizacja w chmurze nie zadziała, dopóki go nie ustawisz.';
  const inp = document.getElementById('encPassInput');
  if (inp) inp.value = getEncPass();
}
function saveEncPass() {
  const v = (document.getElementById('encPassInput').value || '').trim();
  if (v) LSset(ENC_PASS_KEY, v); else LSdel(ENC_PASS_KEY);
  refreshEncPassUI();
  alert(v ? 'Hasło szyfrujące zapisane na tym urządzeniu.' : 'Hasło szyfrujące usunięte.');
}

function scheduleStatePush() {
  if (TAKT_CONFIG.syncMode !== 'encrypted-cloud') return;  // Model A: wpłaty NIE idą do chmury
  if (applyingCloudState) return;  // właśnie wczytujemy z chmury — nie odsyłaj
  LSset(SYNC_DIRTY_KEY, '1');
  clearTimeout(statePushTimer);
  statePushTimer = setTimeout(() => pushStateNow(false), 2500);
  updateSyncStatusUI();
}

async function pushStateNow(force) {
  if (TAKT_CONFIG.syncMode !== 'encrypted-cloud') return false;
  if (statePulling) return false;
  const sb = getSb();
  if (!sb || !db.cloud || !db.cloud.trainerPin) return false;  // dirty zostaje — wyśle się później
  if (statePushing) { scheduleStatePush(); return false; }
  if (LSget(SYNC_DIRTY_KEY) !== '1' && !force) return true;
  const encPass = getEncPass();
  if (!encPass) { if (force) alert('Najpierw ustaw hasło szyfrujące w oknie chmury (sekcja „Synchronizacja"), aby bezpiecznie wysłać dane.'); return false; }
  statePushing = true;
  let savedAt = null, conflictMsg = null;
  try {
    const baseS = LSget(SYNC_BASE_KEY);
    const payload = await encryptDb(db, encPass);  // Model B: do chmury idzie tylko szyfrogram
    const { data, error } = await sb.rpc('state_save', {
      p_pin: db.cloud.trainerPin, p_data: payload, p_device: deviceName(),
      p_base: (force || !baseS) ? null : Number(baseS), p_force: !!force
    });
    if (error) {
      if ((error.message || '').indexOf('KONFLIKT') >= 0) conflictMsg = error.message;
      else updateCloudStatusUI('offline');
    } else savedAt = data;
  } catch (e) { /* sieć — dirty zostaje */ }
  statePushing = false;
  if (conflictMsg) {
    const ovr = confirm('⚠ ' + conflictMsg + '\n\nOK = nadpisz chmurę wersją z TEGO urządzenia.\nAnuluj = nic nie wysyłaj (wersję z chmury możesz wczytać: status chmury → „⬇ Wczytaj z chmury").');
    if (ovr) return pushStateNow(true);
    return false;
  }
  if (savedAt == null) return false;
  LSset(SYNC_BASE_KEY, String(savedAt));
  LSdel(SYNC_DIRTY_KEY);
  updateSyncStatusUI();
  return true;
}

async function loadStateFromCloud(interactive) {
  if (TAKT_CONFIG.syncMode !== 'encrypted-cloud') { if (interactive) alert('Synchronizacja przez chmurę jest wyłączona (Model A — wpłaty tylko lokalnie). Kopię danych przenosisz plikiem backupu w folderze szkoły.'); return; }
  const sb = getSb();
  if (!sb || !db.cloud || !db.cloud.trainerPin) {
    if (interactive) alert('Najpierw podaj PIN trenera (i sprawdź internet).');
    return;
  }
  clearTimeout(statePushTimer);  // nie wysyłaj niczego w trakcie wczytywania
  statePulling = true;
  try {
    const { data, error } = await sb.rpc('state_load', { p_pin: db.cloud.trainerPin });
    if (error) { updateCloudStatusUI('offline'); if (interactive) alert('Błąd wczytywania z chmury: ' + (error.message || error)); return; }
    updateCloudStatusUI('online');
    if (!data) { if (interactive) alert('W chmurze nie ma jeszcze zapisanych danych — wyślą się automatycznie przy najbliższej zmianie (albo kliknij „⬆ Wyślij do chmury").'); return; }
    const base = LSget(SYNC_BASE_KEY);
    if (base && Number(base) === Number(data.updated_at)) {
      if (interactive) alert('Dane są aktualne (ostatni zapis: ' + (data.saved_at || '?') + ', z: ' + (data.device || '?') + ').');
      return;
    }
    const dirty = LSget(SYNC_DIRTY_KEY) === '1';
    if (dirty && !isDbEmptyish()
        && !confirm('⚠ Masz na tym urządzeniu zmiany niewysłane do chmury.\n\nWczytać wersję z chmury (zapis: ' + (data.saved_at || '?') + ', z: ' + (data.device || '?') + ') i NADPISAĆ lokalne zmiany?')) return;
    // Model B: dane w chmurze są zaszyfrowane — odszyfruj hasłem tego urządzenia
    if (data.data && data.data.enc) {
      const pass = getEncPass();
      if (!pass) { if (interactive) alert('Ustaw hasło szyfrujące (okno chmury → „Synchronizacja"), aby odczytać dane z chmury.'); return; }
      try { data.data = await decryptDb(data.data, pass); }
      catch (e) { if (interactive) alert('Nie udało się odszyfrować danych z chmury.\nSprawdź, czy hasło szyfrujące jest DOKŁADNIE takie samo jak na urządzeniu, które wysłało dane.'); return; }
    }
    applyCloudState(data);
    if (interactive) alert('Wczytano dane z chmury (zapis: ' + (data.saved_at || '?') + ', z: ' + (data.device || '?') + ').');
  } finally { statePulling = false; }
}

function applyCloudState(payload) {
  applyingCloudState = true;
  try {
    const pin = db.cloud && db.cloud.trainerPin;
    LSset('taniec_db_v2', JSON.stringify(payload.data || {}));
    loadDb();  // wczytuje + uzupełnia domyślne pola i migracje
    if (pin) { if (!db.cloud) db.cloud = {}; db.cloud.trainerPin = pin; }
    LSset(SYNC_BASE_KEY, String(payload.updated_at));
    LSdel(SYNC_DIRTY_KEY);
    saveDb();  // zapis lokalny + plik backupu (push zablokowany flagą)
    renderParticipants(); renderStats(); renderSavedMonth(); renderManualReview(); renderPlatnosci();
    renderGrafik(); renderSzkolenia();
    updateSyncStatusUI();
    pullBookingsCore().catch(() => {});  // odśwież zapisy par (stan mógł być starszy niż rezerwacje)
  } finally { applyingCloudState = false; }
}

async function manualStatePush() {
  LSset(SYNC_DIRTY_KEY, '1');  // wymuś wysyłkę nawet bez zmian
  const ok = await pushStateNow(false);
  updateSyncStatusUI();
  if (ok) alert('Dane wysłane do chmury.');
}

function updateSyncStatusUI() {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const base = LSget(SYNC_BASE_KEY);
  const dirty = LSget(SYNC_DIRTY_KEY) === '1';
  let t = 'To urządzenie: ' + deviceName() + '. ';
  t += base ? ('Zsynchronizowano: ' + new Date(Number(base)).toLocaleString('pl-PL') + '.') : 'Jeszcze nie synchronizowano.';
  if (dirty) t += ' ⚠ Lokalne zmiany czekają na wysłanie.';
  el.textContent = t;
}

async function autoLoadStateOnStart() {
  if (TAKT_CONFIG.syncMode !== 'encrypted-cloud') return;
  if (!db.cloud || !db.cloud.trainerPin) return;
  await loadStateFromCloud(false);
}

// ===================== SZKOLENIA WEEKENDOWE (Sob/Niedz, szkoleniowcy gościnni) =====================
let currentTrainingId = null;

function parseDate(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
function addDays(s, n) { const d = parseDate(s); d.setDate(d.getDate() + n); return fmtDate(d); }
function fmtDMfromStr(s) { return s ? fmtDM(parseDate(s)) : ''; }
function coachName(id) { const c = db.coaches.find(x => x.id === id); return c ? c.name : ''; }

let trScope = 'both'; // 'both' | 'sat' | 'sun' — które dni obejmuje szkolenie
function setTrainingScope(s) {
  trScope = s;
  document.querySelectorAll('#trScopeSeg button').forEach(b => b.classList.toggle('active', b.getAttribute('data-scope') === s));
  document.getElementById('trDateLabel').textContent = (s === 'sun') ? 'Data niedzieli *' : 'Data soboty *';
  document.getElementById('trDateHint').textContent =
    s === 'both' ? 'Niedziela liczona automatycznie jako kolejny dzień.' :
    s === 'sat'  ? 'Szkolenie tylko w sobotę.' : 'Szkolenie tylko w niedzielę.';
}
function trainingDateText(t) {
  const ad = (t.days && t.days.length) ? t.days : ['sobota', 'niedziela'];
  if (ad.length === 2) return fmtDMfromStr(t.dateSat) + ' – ' + fmtDMfromStr(t.dateSun);
  if (ad.includes('sobota')) return fmtDMfromStr(t.dateSat) + ' (sob)';
  return fmtDMfromStr(t.dateSun) + ' (niedz)';
}

function renderSzkolenia() {
  if (currentTrainingId && db.trainings.find(t => t.id === currentTrainingId)) renderTrainingDetail();
  else { currentTrainingId = null; renderTrainingsList(); }
}

function renderTrainingsList() {
  document.getElementById('szkListView').style.display = '';
  document.getElementById('szkDetailView').style.display = 'none';
  const box = document.getElementById('szkList');
  if (!db.trainings.length) {
    box.innerHTML = '<div class="graf-empty">Brak szkoleń — dodaj pierwsze przyciskiem „+ Szkolenie".</div>';
    return;
  }
  const sorted = db.trainings.slice().sort((a, b) => (b.dateSat || '').localeCompare(a.dateSat || ''));
  box.innerHTML = sorted.map(t => {
    const coaches = (t.coachIds || []).map(coachName).filter(Boolean);
    const lessons = db.lessons.filter(l => l.trainingId === t.id);
    const booked = lessons.filter(l => l.pair && l.pair.trim());
    const value = booked.reduce((s, l) => s + ((l.price != null) ? l.price : TAKT_CONFIG.defaultLessonPrice), 0);
    return `<div class="szk-card" onclick="openTraining('${t.id}')">
      <div class="szk-card-main">
        <div class="szk-card-name">${esc(t.name)}</div>
        <div class="szk-card-meta">📅 ${trainingDateText(t)} · ${coaches.length ? esc(coaches.join(', ')) : '<em>brak szkoleniowców</em>'}</div>
        <div class="szk-card-meta">${lessons.length} lekcji · ${booked.length} zapisanych · ${value} zł</div>
      </div>
      <div class="szk-card-actions">
        <button title="Edytuj" onclick="event.stopPropagation();openTrainingModal('${t.id}')">✎</button>
        <button title="Usuń" onclick="event.stopPropagation();deleteTraining('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function openTraining(id) { currentTrainingId = id; renderSzkolenia(); }
function closeTraining() { currentTrainingId = null; renderSzkolenia(); }

function renderTrainingDetail() {
  const t = db.trainings.find(x => x.id === currentTrainingId);
  if (!t) { closeTraining(); return; }
  document.getElementById('szkListView').style.display = 'none';
  document.getElementById('szkDetailView').style.display = '';
  document.getElementById('szkDetailTitle').textContent = t.name + ' · ' + trainingDateText(t);
  const activeDays = (t.days && t.days.length) ? t.days : ['sobota', 'niedziela'];
  [['sobota', t.dateSat], ['niedziela', t.dateSun]].forEach(([day, dateStr]) => {
    const wrap = document.getElementById('szk-day-' + day);
    const active = activeDays.includes(day);
    if (wrap) wrap.style.display = active ? '' : 'none';
    if (!active) return;
    const head = document.getElementById('szk-head-' + day);
    if (head) head.textContent = (day === 'sobota' ? 'Sobota' : 'Niedziela') + ' ' + fmtDMfromStr(dateStr);
    const box = document.getElementById('szk-' + day);
    if (!box) return;
    const lessons = db.lessons.filter(l => l.trainingId === t.id && l.day === day);
    if (!lessons.length) { box.innerHTML = '<div class="graf-empty">Brak lekcji — dodaj poniżej</div>'; return; }
    const byCoach = {};
    lessons.forEach(l => { (byCoach[l.trainer] = byCoach[l.trainer] || []).push(l); });
    const ordered = (t.coachIds || []).map(coachName).filter(n => n && byCoach[n]);
    const order = ordered.concat(Object.keys(byCoach).filter(n => !ordered.includes(n)));
    box.innerHTML = '<div class="graf-tcols">' + order.map(cn => {
      const list = byCoach[cn].sort((a, b) => a.start.localeCompare(b.start));
      return `<div class="graf-tcol"><div class="graf-tcol-head">${esc(cn)}</div><div class="graf-tcol-body">`
        + list.map(lessonSlotHtml).join('') + `</div></div>`;
    }).join('') + '</div>';
  });
  renderTrainingPaySummary(t);
}

function renderTrainingPaySummary(t) {
  const el = document.getElementById('szkPaySummary');
  if (!el) return;
  const booked = db.lessons.filter(l => l.trainingId === t.id && l.pair && l.pair.trim());
  const price = l => (l.price != null) ? l.price : TAKT_CONFIG.defaultLessonPrice;
  if (!booked.length) { el.innerHTML = ''; return; }
  const total = booked.reduce((s, l) => s + price(l), 0);
  const paid = booked.filter(l => l.paid).reduce((s, l) => s + price(l), 0);
  el.innerHTML =
    `<div class="ps">Zapisanych lekcji <b>${booked.length}</b></div>` +
    `<div class="ps">Wartość łącznie <b>${total} zł</b></div>` +
    `<div class="ps paid">Opłacone <b>${paid} zł</b></div>` +
    `<div class="ps due">Do zapłaty <b>${total - paid} zł</b></div>`;
}

function renderCoachRows(list) {

function addCoachRow() {

function saveCoaches() {
  const rows = [...document.querySelectorAll('#coachRows .coach-row')];
  const out = [];
  for (const r of rows) {
    const name = r.querySelector('.coach-name').value.trim();
    const priceRaw = r.querySelector('.coach-price').value.trim();
    if (!name) continue;
    if (priceRaw === '' || isNaN(+priceRaw) || +priceRaw < 0) { alert('Podaj poprawną cenę za lekcję dla: ' + name); return; }
    const existingId = r.getAttribute('data-id');
    out.push({ id: existingId || uid(), name, price: +priceRaw });
  }
  db.coaches = out;
  // Zaktualizuj nazwę prowadzącego w istniejących lekcjach (cena na lekcji to snapshot — NIE ruszamy).
  db.lessons.forEach(l => { if (l.kind === 'weekend' && l.coachId) { const c = out.find(x => x.id === l.coachId); if (c) l.trainer = c.name; } });

// ---- Szkolenie (weekend) ----
function openTrainingModal(id) {
  const editing = id && db.trainings.find(t => t.id === id);
  document.getElementById('trainingModalTitle').textContent = editing ? 'Edytuj szkolenie' : 'Nowe szkolenie';
  document.getElementById('trId').value = editing ? id : '';
  document.getElementById('trName').value = editing ? editing.name : '';
  let scope = 'both';
  if (editing) { const d = editing.days || ['sobota', 'niedziela']; scope = (d.length === 2) ? 'both' : (d.includes('sobota') ? 'sat' : 'sun'); }
  setTrainingScope(scope);
  document.getElementById('trDateSat').value = editing ? (scope === 'sun' ? editing.dateSun : editing.dateSat) : '';
  const checks = db.coaches.map(c =>
    `<label style="display:flex;align-items:center;gap:8px;font-weight:500;cursor:pointer">
      <input type="checkbox" class="tr-coach-check" value="${c.id}" ${editing && (editing.coachIds || []).includes(c.id) ? 'checked' : ''}>
      ${esc(c.name)} <span style="color:var(--text-muted)">· ${c.price} zł</span>
    </label>`).join('');
  document.getElementById('trCoachChecks').innerHTML = checks || '<div class="hint">Brak szkoleniowców — dodaj ich najpierw przez „⚙ Szkoleniowcy".</div>';
  openModal('trainingModal');
}
function saveTraining() {
  const id = document.getElementById('trId').value;
  const name = document.getElementById('trName').value.trim();
  const picked = document.getElementById('trDateSat').value;
  const coachIds = [...document.querySelectorAll('.tr-coach-check:checked')].map(c => c.value);
  if (!name) { alert('Podaj nazwę szkolenia.'); return; }
  if (!picked) { alert(trScope === 'sun' ? 'Wybierz datę niedzieli.' : 'Wybierz datę soboty.'); return; }
  if (!coachIds.length) { alert('Zaznacz co najmniej jednego szkoleniowca.'); return; }
  // wyznacz daty + dni wg wybranego zakresu
  let dateSat, dateSun, days;
  if (trScope === 'sun')      { dateSun = picked; dateSat = addDays(picked, -1); days = ['niedziela']; }
  else if (trScope === 'sat') { dateSat = picked; dateSun = addDays(picked, 1);  days = ['sobota']; }
  else                        { dateSat = picked; dateSun = addDays(picked, 1);  days = ['sobota', 'niedziela']; }
  if (id) {
    const t = db.trainings.find(x => x.id === id);
    if (t) {
      t.name = name; t.dateSat = dateSat; t.dateSun = dateSun; t.coachIds = coachIds; t.days = days;
      // usuń lekcje z dni, które wypadły z zakresu; pozostałe przenieś na (ewentualnie nowe) daty
      db.lessons = db.lessons.filter(l => !(l.trainingId === id && !days.includes(l.day)));
      db.lessons.forEach(l => { if (l.trainingId === id) l.date = (l.day === 'sobota') ? dateSat : dateSun; });
    }
  } else {
    const newId = uid();
    db.trainings.push({ id: newId, name, dateSat, dateSun, coachIds, days });
    currentTrainingId = newId;
  }
  saveDb();
  closeModal('trainingModal');
  renderSzkolenia();
}
// Mapowanie lokalnej lekcji weekendowej na slot do chmury.
function trainingSlot(l) {
  return { id: l.id, date: l.date, weekday: l.day, trainer: l.trainer, style: l.style, start_time: l.start, price: l.price, kind: 'weekend' };
}

async function deleteTraining(id) {
  const t = db.trainings.find(x => x.id === id);
  if (!t) return;
  const n = db.lessons.filter(l => l.trainingId === id).length;
  if (!confirm(`Usunąć szkolenie „${t.name}"${n ? ' wraz z ' + n + ' lekcjami' : ''}?\nLekcje zostaną też usunięte ze strony zapisów dla par.`)) return;

  const activeDays = (t.days && t.days.length) ? t.days : ['sobota', 'niedziela'];
  const pDates = activeDays.map(d => d === 'sobota' ? t.dateSat : t.dateSun);

  // usuń lokalnie
  db.trainings = db.trainings.filter(x => x.id !== id);
  db.lessons = db.lessons.filter(l => l.trainingId !== id);
  if (currentTrainingId === id) currentTrainingId = null;
  saveDb();
  renderSzkolenia();

  // wyczyść z chmury: zsynchronizuj te daty publikując POZOSTAŁE lekcje weekendowe
  // (publish_training usunie wszystko inne na tych dniach — czyli skasowane szkolenie).
  const sb = getSb();
  if (!n) return; // nic nie było do usunięcia
  if (!sb || !db.cloud || !db.cloud.trainerPin) {
    alert('Szkolenie usunięto lokalnie, ale BEZ połączenia z chmurą (lub bez PIN-u) — lekcje mogą jeszcze być widoczne dla par.\nGdy będziesz online, wejdź w dowolne szkolenie z tego weekendu i kliknij „☁ Publikuj", albo daj znać.');
    return;
  }
  const remaining = db.lessons.filter(l => l.kind === 'weekend' && pDates.includes(l.date)).map(trainingSlot);
  const { error } = await sb.rpc('publish_training', { p_pin: db.cloud.trainerPin, p_dates: pDates, p_slots: remaining });
  if (error) {
    updateCloudStatusUI('offline');
    alert('Szkolenie usunięto lokalnie, ale nie udało się wyczyścić chmury: ' + (error.message || error) + '\nSpróbuj ponownie opublikować pozostałe szkolenia tego weekendu.');
    return;
  }
  updateCloudStatusUI('online');
}

// ---- Lekcja szkoleniowa ----
function openTrLessonModal(day) {
  const t = db.trainings.find(x => x.id === currentTrainingId);
  if (!t) return;
  if (t.days && !t.days.includes(day)) return; // dzień poza zakresem szkolenia
  const coaches = (t.coachIds || []).map(cid => db.coaches.find(c => c.id === cid)).filter(Boolean);
  if (!coaches.length) { alert('To szkolenie nie ma przypisanych szkoleniowców — edytuj je i dodaj prowadzących.'); return; }
  document.getElementById('trlDay').value = day;
  document.getElementById('trlStyle').value = 'LA';
  document.getElementById('trlStart').value = '10:00';
  document.getElementById('trlCoach').innerHTML = coaches.map(c => `<option value="${c.id}">${esc(c.name)} — ${c.price} zł</option>`).join('');
  document.getElementById('trLessonModalTitle').textContent =
    'Dodaj lekcję — ' + (day === 'sobota' ? 'sobota ' + fmtDMfromStr(t.dateSat) : 'niedziela ' + fmtDMfromStr(t.dateSun));
  updateTrLessonPrice();
  openModal('trLessonModal');
}
function updateTrLessonPrice() {
  const c = db.coaches.find(x => x.id === document.getElementById('trlCoach').value);
  document.getElementById('trlPriceHint').textContent = c ? ('Cena za lekcję: ' + c.price + ' zł') : '';
}
function saveTrLesson() {
  const t = db.trainings.find(x => x.id === currentTrainingId);
  if (!t) return;
  const day = document.getElementById('trlDay').value;
  const coachId = document.getElementById('trlCoach').value;
  const coach = db.coaches.find(c => c.id === coachId);
  const style = document.getElementById('trlStyle').value;
  const start = document.getElementById('trlStart').value;
  if (!coach || !style || !start) { alert('Uzupełnij szkoleniowca, styl i godzinę.'); return; }
  const date = (day === 'sobota') ? t.dateSat : t.dateSun;
  // kolizja: ten sam szkoleniowiec, ten sam dzień, nakładające się 45 min
  const toMin = s => { const [h, m] = s.split(':').map(Number); return h * 60 + m; };
  const ns = toMin(start), ne = ns + 45;
  const clash = db.lessons.find(l => l.trainingId === t.id && l.coachId === coachId && l.date === date
    && (() => { const es = toMin(l.start), ee = es + 45; return ns < ee && es < ne; })());
  if (clash) { alert(`${coach.name} ma już lekcję ${clash.start} – ${addMinutes(clash.start, 45)} tego dnia. Wybierz inną godzinę.`); return; }
  db.lessons.push({ id: uid(), kind: 'weekend', trainingId: t.id, coachId, day, date, trainer: coach.name, style, start, price: coach.price, pair: '', people: 2, paid: false, bookedBy: '', bookedAt: null });
  saveDb();
  closeModal('trLessonModal');
  renderSzkolenia();
}

// ---- Chmura: publikacja / pobieranie zapisów szkolenia ----
async function publishTraining() {
  const t = db.trainings.find(x => x.id === currentTrainingId);
  if (!t) return;
  const sb = getSb();
  if (!sb) { alert('Brak połączenia z internetem.'); updateCloudStatusUI('offline'); return; }
  if (!db.cloud || !db.cloud.trainerPin) { alert('Najpierw podaj PIN trenera (kliknij status chmury).'); openCloudModal(); return; }
  const slots = db.lessons.filter(l => l.trainingId === t.id).map(l => ({
    id: l.id, date: l.date, weekday: l.day, trainer: l.trainer, style: l.style, start_time: l.start, price: l.price, kind: 'weekend'
  }));
  const activeDays = (t.days && t.days.length) ? t.days : ['sobota', 'niedziela'];
  const pDates = activeDays.map(d => d === 'sobota' ? t.dateSat : t.dateSun);
  if (!slots.length && !confirm('Brak lekcji w tym szkoleniu — opublikować pusto (usunie zdalne sloty tego weekendu)?')) return;
  const { error } = await sb.rpc('publish_training', { p_pin: db.cloud.trainerPin, p_dates: pDates, p_slots: slots });
  if (error) { updateCloudStatusUI('offline'); alert('Błąd publikacji: ' + (error.message || error)); return; }
  updateCloudStatusUI('online');
  alert('Opublikowano ' + slots.length + ' lekcji szkolenia do chmury.');
}
async function pullTrainingBookings() {
  const t = db.trainings.find(x => x.id === currentTrainingId);
  if (!t) return;
  const sb = getSb();
  if (!sb) { alert('Brak połączenia z internetem.'); updateCloudStatusUI('offline'); return; }
  if (!db.cloud || !db.cloud.trainerPin) { alert('Najpierw podaj PIN trenera (kliknij status chmury).'); openCloudModal(); return; }
  const from = t.dateSat || t.dateSun, to = t.dateSun || t.dateSat;
  const { data, error } = await sb.rpc('trainer_slots', { p_pin: db.cloud.trainerPin, p_from: from, p_to: to });
  if (error) { updateCloudStatusUI('offline'); alert('Błąd pobierania: ' + (error.message || error)); return; }
  updateCloudStatusUI('online');
  let updated = 0;
  (data || []).forEach(r => {
    const l = db.lessons.find(x => x.id === r.id);
    if (!l) return;
    const newPair = r.pair || '';
    const newPeople = (r.people === 1) ? 1 : 2;
    if ((l.pair || '') !== newPair || (l.people || 2) !== newPeople) {
      l.pair = newPair; l.bookedBy = r.booked_by || ''; l.bookedAt = r.booked_at || null; l.people = newPeople;
      if (!newPair) l.paid = false;
      updated++;
    }
  });
  saveDb();
  renderSzkolenia();
  alert(updated ? ('Zaktualizowano zapisy: ' + updated) : 'Brak nowych zapisów w tym szkoleniu.');
}

// ===================== PARTICIPANTS =====================
function getGroups() {
  return [...new Set(db.participants.map(p => p.group))].filter(Boolean).sort();
}

function renderParticipants() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const groupF = document.getElementById('groupFilter').value;
  const groups = getGroups();

  // Update group filter options
  const gf = document.getElementById('groupFilter');
  const curVal = gf.value;
  gf.innerHTML = '<option value="">Wszystkie grupy</option>' + groups.map(g => `<option value="${esc(g)}"${g===curVal?' selected':''}>${esc(g)}</option>`).join('');

  // Update datalist
  document.getElementById('groupSuggestions').innerHTML = groups.map(g => `<option value="${esc(g)}">`).join('');
  document.getElementById('statsGroupFilter').innerHTML = '<option value="">Wszystkie grupy</option>' + groups.map(g => `<option value="${esc(g)}">${esc(g)}</option>`).join('');

  const filtered = db.participants.filter(p => {
    const name = (p.firstName + ' ' + p.lastName).toLowerCase();
    return (!search || name.includes(search)) && (!groupF || p.group === groupF);
  }).sort((a,b) => a.lastName.localeCompare(b.lastName, 'pl'));

  document.getElementById('participantCount').textContent = filtered.length + ' os.';

  if (filtered.length === 0) {
    document.getElementById('participantTableWrap').innerHTML = `<div class="empty-state"><div class="icon">👥</div><div>Brak uczestników${search||groupF?' pasujących do filtrów':' — dodaj pierwszego!'}</div></div>`;
    return;
  }

  const rows = filtered.map(p => {
    const payCount = countPayments(p.id);
    const partner = p.pairId ? db.participants.find(x => x.id !== p.id && x.pairId === p.pairId) : null;
    const guardian = p.guardianId ? db.participants.find(x => x.id === p.guardianId) : null;
    const linked = p.linkedId ? db.participants.filter(x => x.id !== p.id && x.linkedId === p.linkedId) : [];
    const sibling = p.siblingId ? db.participants.find(x => x.id !== p.id && x.siblingId === p.siblingId) : null;
    const partnerCell = partner
      ? `<span class="chip" style="background:#fde68a;color:#92400e">🤝 ${esc(partner.lastName)} ${esc(partner.firstName)}</span>`
      : guardian
        ? `<span class="chip" style="background:#dbeafe;color:#1e40af">👤 ${esc(guardian.lastName)} ${esc(guardian.firstName)}</span>`
        : sibling
          ? `<span class="chip" style="background:#fce7f3;color:#9d174d">👫 ${esc(sibling.lastName)} ${esc(sibling.firstName)} <small>(${esc(sibling.group)})</small></span>`
          : linked.length
            ? linked.map(x => `<span class="chip" style="background:#e0f2fe;color:#0369a1">🔗 ${esc(x.lastName)} ${esc(x.firstName)} <small>(${esc(x.group)})</small></span>`).join(' ')
            : `<span style="color:var(--text-muted);font-size:.82rem">—</span>`;
    return `<tr>
      <td>${esc(p.firstName)}</td>
      <td><strong>${esc(p.lastName)}</strong></td>
      <td><span class="chip">${esc(p.group)}</span></td>
      <td>${partnerCell}</td>
      <td><span class="badge badge-info">${payCount} wpł.</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openParticipantModal('${p.id}')">✏️ Edytuj</button>
        <button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;margin-left:4px" onclick="openDeleteModal('${p.id}')">🗑</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('participantTableWrap').innerHTML = `
    <table>
      <thead><tr><th>Imię</th><th>Nazwisko</th><th>Grupa</th><th>Powiązanie</th><th>Wpłaty</th><th>Akcje</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function countPayments(participantId) {
  let count = 0;
  for (const key in db.payments) {
    if (db.payments[key].some(p => p.participantId === participantId)) count++;
  }
  return count;
}

function openParticipantModal(id) {

      .map(p => `<option value="${p.id}"${p.id === currentGuardianId ? ' selected' : ''}>${esc(p.lastName)} ${esc(p.firstName)} (${esc(p.group)})</option>`)

  // Linked (same person, multiple courses) dropdown

      .join('');

  const currentSiblingId = currentP?.siblingId
    ? (db.participants.find(x => x.id !== id && x.siblingId === currentP.siblingId)?.id || '')
    : '';
  document.getElementById('pSibling').innerHTML =
    '<option value="">— brak —</option>' +
    others.sort((a,b) => a.lastName.localeCompare(b.lastName,'pl'))
      .map(p => `<option value="${p.id}"${p.id === currentSiblingId ? ' selected' : ''}>${esc(p.lastName)} ${esc(p.firstName)} (${esc(p.group)})</option>`)
      .join('');
  openModal('participantModal');
}

function saveParticipant() {
  const firstName = document.getElementById('pFirstName').value.trim();
  const lastName = document.getElementById('pLastName').value.trim();
  const group = document.getElementById('pGroup').value.trim();
  const newPartnerId = document.getElementById('pPartner').value;
  const newGuardianId = document.getElementById('pGuardian').value;
  if ((!firstName && !lastName) || !group) { alert('Uzupełnij co najmniej imię lub nazwisko oraz grupę!'); return; }

  let participant;
  if (editingId) {
    participant = db.participants.find(x => x.id === editingId);
    // Dissolve old pair (but keep familyId for children)
    if (participant.pairId) {
      db.participants.forEach(p => { if (p.pairId === participant.pairId) delete p.pairId; });
    }
    participant.firstName = firstName; participant.lastName = lastName; participant.group = group;
  } else {
    participant = { id: uid(), firstName, lastName, group };
    db.participants.push(participant);
  }

  // Assign dance partner (pair) — for adult couples
  if (newPartnerId) {
    const partner = db.participants.find(p => p.id === newPartnerId);
    if (partner) {
      if (partner.pairId) {
        db.participants.forEach(p => { if (p.pairId === partner.pairId) delete p.pairId; });
      }
      const pairId = uid();
      participant.pairId = pairId;
      participant.familyId = pairId;
      partner.pairId = pairId;
      partner.familyId = pairId;
      // Propagate familyId to ALL existing children of both parents (fix stale familyId on children)
      const parentIds = new Set([participant.id, partner.id]);
      db.participants.forEach(p => {
        if (parentIds.has(p.guardianId)) p.familyId = pairId;
      });
    }
  } else {
    delete participant.pairId;
    // Rebuild familyId from guardian if applicable
    if (!newGuardianId) delete participant.familyId;
  }

  // Assign guardian (parent) — for children
  if (newGuardianId) {
    const guardian = db.participants.find(p => p.id === newGuardianId);
    if (guardian) {
      participant.guardianId = newGuardianId;
      // familyId = guardian's familyId or pairId (create one if needed)
      let fid = guardian.familyId || guardian.pairId;
      if (!fid) {
        fid = uid();
        guardian.familyId = fid;
        // If guardian has a partner, update them too
        if (guardian.pairId) {
          db.participants.forEach(p => { if (p.pairId === guardian.pairId) p.familyId = fid; });
        }
      }
      participant.familyId = fid;
    }
  } else {
    delete participant.guardianId;
    if (!newPartnerId) delete participant.familyId;
  }

  // Linked participant (same person, multiple courses)
  const newLinkedPersonId = document.getElementById('pLinked').value;
  // First: remove current participant from any existing linked group
  if (participant.linkedId) {
    const oldLid = participant.linkedId;
    delete participant.linkedId;
    // If only one other remains with this linkedId, clean up orphan
    const remaining = db.participants.filter(p => p.linkedId === oldLid);
    if (remaining.length === 1) delete remaining[0].linkedId;
  }
  if (newLinkedPersonId) {
    const linked = db.participants.find(p => p.id === newLinkedPersonId);
    if (linked) {
      // Reuse linked person's existing linkedId group, or create new
      const lid = linked.linkedId || uid();
      participant.linkedId = lid;
      linked.linkedId = lid;
    }
  }

  // Rodzeństwo — sibling in different group paying together
  if (participant.siblingId) {
    const oldSid = participant.siblingId;
    delete participant.siblingId;
    const remaining = db.participants.filter(p => p.siblingId === oldSid);
    if (remaining.length === 1) delete remaining[0].siblingId;
  }
  const newSiblingPersonId = document.getElementById('pSibling').value;
  if (newSiblingPersonId) {
    const sib = db.participants.find(p => p.id === newSiblingPersonId);
    if (sib) {
      if (sib.siblingId) {
        const oldSid2 = sib.siblingId;
        db.participants.forEach(p => { if (p.siblingId === oldSid2) delete p.siblingId; });
      }
      const sid = uid();
      participant.siblingId = sid;
      sib.siblingId = sid;
    }
  }

  saveDb();
  closeModal('participantModal');
  renderParticipants();
}

}

/// Normalize: lowercase + remove diacritics (Polish + encoding artifacts)
function normalize(str) {
  return str.toLowerCase()
    .replace(/[Œœ]/g, 's')           // Œ/œ = artefakt MT940/PKO BP dla Ś (np. ŒLAWSKI → SLAWSKI)
    .replace(/\s*-\s*/g, '-')         // normalizuj myślniki: "Izdebska - Ratka" → "izdebska-ratka"
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // rozkład NFD usuwa ą→a, ę→e, ś→s, ó→o itd.
    .replace(/ł/g, 'l')              // ł nie rozkłada się przez NFD
    .replace(/[^\x00-\x7f]/g, '');   // usuń pozostałe non-ASCII (artefakty złego kodowania pliku)
}

// Sprawdza czy znormalizowane imię jest w linii — uwzględnia zdrobnienia (NICK_MAP)
function nameInLine(nameNorm, lineNorm) {
  if (!nameNorm) return false;
  if (lineNorm.includes(nameNorm)) return true;
  // Czy nameNorm to forma oficjalna → szukaj zdrobnień
  for (const [dim, formal] of Object.entries(EFF_NICKS)) {
    if (formal === nameNorm && lineNorm.includes(dim)) return true;
  }
  // Czy nameNorm to zdrobnienie → szukaj formy oficjalnej
  const formal = EFF_NICKS[nameNorm];
  if (formal && lineNorm.includes(formal)) return true;
  return false;
}

// Levenshtein — odległość edycyjna (do wykrywania błędów kodowania znaków, np. Gśska vs Gąska)
function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) =>
    Array.from({length: n + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
  return dp[m][n];
}

// Przybliżone wyszukiwanie imienia w linii (odległość = 1, min. 4 znaki — błędy kodowania)
function nameFuzzyInLine(nameNorm, lineNorm) {
  if (!nameNorm || nameNorm.length < 4) return false;
  const tokens = lineNorm.split(/[^a-z]+/)
    .filter(t => Math.abs(t.length - nameNorm.length) <= 2 && t.length >= 3);
  return tokens.some(t => levenshtein(nameNorm, t) === 1);
}

// Wykrywa miesiące z tytułu lub daty przelewu — zwraca tablicę (obsługuje "marzec + kwiecień")
function detectTransferMonths(line, date) {
  const norm = normalize(line);
  const yearMatch = line.match(/\b(20\d{2})\b/);
  const yearHint = yearMatch ? parseInt(yearMatch[1])
    : (date instanceof Date && !isNaN(date) ? date.getFullYear() : currentYear);

  // 1. Polskie nazwy miesięcy — może być kilka naraz (multi-miesięczny przelew)
  const monthNorms = ['styczen','luty','marzec','kwiecien','maj','czerwiec',
                      'lipiec','sierpien','wrzesien','pazdziernik','listopad','grudzien'];
  const fromTitle = [];
  monthNorms.forEach((mn, i) => {
    if (norm.includes(mn)) fromTitle.push({ month: i, year: yearHint, source: 'title', confidence: 'high' });
  });
  if (fromTitle.length > 0) return fromTitle;

  // 2. Cyfry rzymskie: III/2026, IV.2026 itp.
  const romanMap = { 'xii':11,'xi':10,'x':9,'ix':8,'viii':7,'vii':6,'vi':5,'v':4,'iv':3,'iii':2,'ii':1,'i':0 };
  const romanMatch = norm.match(/\b(xii|xi|x|ix|viii|vii|vi|v|iv|iii|ii|i)[\s\/\.\-](20\d{2})\b/);
  if (romanMatch) return [{ month: romanMap[romanMatch[1]], year: parseInt(romanMatch[2]), source: 'title', confidence: 'high' }];

  // 3. Format MM/YYYY lub MM.YYYY
  const numMatch = line.match(/\b(0?[1-9]|1[0-2])[\/\.](20\d{2})\b/);
  if (numMatch) return [{ month: parseInt(numMatch[1])-1, year: parseInt(numMatch[2]), source: 'title', confidence: 'high' }];

  // 4. Data przelewu z pliku (pewność: średnia)
  if (date instanceof Date && !isNaN(date)) {
    return [{ month: date.getMonth(), year: date.getFullYear(), source: 'date', confidence: 'medium' }];
  }

  return []; // brak detekcji
}

function loadTransferFile(input) {

}

function parseSTA(text) {
  // Parse MT940 / STA format — extract searchable lines from each transaction
  const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const result = [];

  // Split into transaction blocks starting with :61:
  const entries = raw.split(/\n(?=:61:)/);

  for (const entry of entries) {
    if (!entry.trimStart().startsWith(':61:')) continue;

    // Collect all :86: lines and ~ continuation lines into one string
    let detailStr = '';
    const entryLines = entry.split('\n');
    let inDetails = false;

    for (const ln of entryLines) {
      if (ln.startsWith(':86:')) {
        inDetails = true;
        detailStr += ln.replace(/^:86:\d*/, ''); // strip :86:CODE prefix
      } else if (inDetails && ln.startsWith('~')) {
        detailStr += ln;
      }
    }

    // Parse ~NN fields: split by ~NN pattern
    const parts = detailStr.split(/~(\d{2})/);
    const fields = {};
    for (let i = 1; i + 1 < parts.length; i += 2) {
      const code = parts[i];
      const value = (parts[i + 1] || '').replace(/\s+/g, ' ');
      fields[code] = (fields[code] || '') + value;
    }

    // Title from ~20 + ~21 + ~22, sender name from ~32 + ~33
    const title = ['20','21','22'].map(c => (fields[c] || '').trim()).join(' ');
    const sender = ['32','33'].map(c => (fields[c] || '').trim()).join(' ');
    const line = (title + ' ' + sender).replace(/\s+/g, ' ').trim();

    // Extract transaction date from :61: field (format: YYMMDD)
    let date = null;
    const dateMatch = entry.match(/^:61:(\d{2})(\d{2})(\d{2})/m);
    if (dateMatch) {
      date = new Date(2000 + parseInt(dateMatch[1]), parseInt(dateMatch[2]) - 1, parseInt(dateMatch[3]));
    }

    if (line) result.push({ line, date });
  }

  return result;
}

function isSTA(text) {
  return /^:20:/m.test(text) || /\n:61:/.test(text) || text.trimStart().startsWith(':61:');
}

function isINGCSV(text) {
  return /"Transaction date"/i.test(text) || /"Data transakcji"/i.test(text) || /^\d{4}-\d{2}-\d{2};/m.test(text);
}

function parseINGCSV(text) {
  const lines = text.split('\n');
  const results = [];
  let dataStarted = false;
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    // Detect the column-header row (English or Polish ING format)
    if (!dataStarted) {
      if (/"Transaction date"/i.test(trimmed) || /"Data transakcji"/i.test(trimmed)) dataStarted = true;
      continue;
    }
    // Stop at footer line
    if (trimmed.startsWith('"The document') || trimmed.startsWith('"Dokument')) break;
    // Split by semicolon, strip surrounding quotes (" or ')
    const cols = trimmed.split(';').map(c => {
      c = c.trim();
      if ((c.startsWith('"') && c.endsWith('"')) || (c.startsWith("'") && c.endsWith("'"))) c = c.slice(1, -1).trim();
      return c;
    });
    if (cols.length < 4) continue;
    // First column must be a date (YYYY-MM-DD) — skip non-data rows
    if (!/^\d{4}-\d{2}-\d{2}$/.test(cols[0])) continue;
    // Combine counterparty (col 2) + title (col 3) — same logic as MT940 sender+title
    const combined = ((cols[2] || '') + ' ' + (cols[3] || '')).replace(/\s+/g, ' ').trim();
    // Parse date from col 0 (YYYY-MM-DD)
    const [dy, dm, dd] = cols[0].split('-').map(Number);
    const date = new Date(dy, dm - 1, dd);
    if (combined) results.push({ line: combined, date });
  }
  return results;
}

// ---- Generyczny parser CSV (dowolny bank) ----
// Nie zna układu kolumn konkretnego banku: znajduje kolumnę z datą i skleja pozostałe
// kolumny tekstowe (pomijając kwoty/salda/kody walut) w jedną linię do wyszukiwania nazwisk.
// Delimiter (; , tab) i format daty (RRRR-MM-DD / DD.MM.RRRR / RRRR/MM/DD) wykrywane automatycznie.
// Dzięki temu obsługuje ING, PKO BP, mBank, Santander itd. bez mapowania kolumn per bank.
function detectDelimiter(text) {
  const sample = text.split('\n').filter(l => l.trim()).slice(0, 15);
  let best = ';', bestScore = -1;
  for (const d of [';', '\t', ',']) {
    const counts = sample.map(l => l.split(d).length);
    if (!counts.length) continue;
    const min = Math.min(...counts), avg = counts.reduce((a, b) => a + b, 0) / counts.length;
    const score = (min > 1 ? min * 2 : 0) + avg;
    if (score > bestScore) { bestScore = score; best = d; }
  }
  return best;
}
function parseCsvDate(s) {
  s = (s || '').trim(); let m;
  if (m = s.match(/^(\d{4})-(\d{2})-(\d{2})/))            return new Date(+m[1], +m[2] - 1, +m[3]);
  if (m = s.match(/^(\d{2})[.\-\/](\d{2})[.\-\/](\d{4})/)) return new Date(+m[3], +m[2] - 1, +m[1]);
  if (m = s.match(/^(\d{4})\/(\d{2})\/(\d{2})/))          return new Date(+m[1], +m[2] - 1, +m[3]);
  return null;
}
function stripQuotes(c) {
  c = (c || '').trim();
  if ((c.startsWith('"') && c.endsWith('"')) || (c.startsWith("'") && c.endsWith("'"))) c = c.slice(1, -1).trim();
  return c;
}
function parseCsvRow(cols) {
  let date = null, dateIdx = -1;
  for (let i = 0; i < cols.length; i++) { const d = parseCsvDate(cols[i]); if (d) { date = d; dateIdx = i; break; } }
  if (!date) return null;   // brak daty = nagłówek/stopka → pomiń
  const textCols = cols.filter((c, i) => {
    if (i === dateIdx) return false;
    const t = (c || '').trim();
    if (!t) return false;
    if (parseCsvDate(t)) return false;               // inne kolumny z datą
    if (/^[-+]?[\d\s.,]+$/.test(t)) return false;     // kwoty / salda / liczby
    if (/^[A-Z]{3}$/.test(t)) return false;           // kod waluty (PLN/EUR)
    return true;
  });
  const line = textCols.join(' ').replace(/\s+/g, ' ').trim();
  return line ? { line, date } : null;
}
function parseGenericCSV(text) {
  const delim = detectDelimiter(text), out = [];
  for (const raw of text.split('\n')) {
    if (!raw.trim() || raw.indexOf(delim) < 0) continue;
    const rec = parseCsvRow(raw.split(delim).map(stripQuotes));
    if (rec) out.push(rec);
  }
  return out;
}
function isGenericCSV(text) {
  const delim = detectDelimiter(text); let hits = 0;
  for (const raw of text.split('\n')) {
    if (raw.indexOf(delim) < 0) continue;
    if (parseCsvRow(raw.split(delim).map(stripQuotes)) && ++hits >= 2) return true;
  }
  return false;
}
